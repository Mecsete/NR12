/* Achata a árvore (Projeto > Área > Máquina > Tarefa > Risco) em 4 listas
   planas, uma por nível — é o que alimenta as 4 seções do modal de revisão. */
function flattenRelatorioImportacao(relatorioProjetos){
  const porTipo = { area:[], maquina:[], tarefa:[], risco:[] };
  function walk(node){
    if(node.tipo!=="projeto") porTipo[node.tipo].push(node);
    (node.filhos||[]).forEach(walk);
  }
  relatorioProjetos.forEach(walk);
  return porTipo;
}
/* Conta, recursivamente, quantos descendentes de cada tipo (área/máquina/
   tarefa/risco) ficaram "novo" ou "atualizado" dentro de um nó — é o que
   monta o resumo tipo "1 máquina nova, 1 risco atualizado" ao lado do nome
   de uma área/máquina/tarefa no modal. */
function tallyDescendentesImportacao(node, t){
  t = t || {area:{novo:0,atualizado:0}, maquina:{novo:0,atualizado:0}, tarefa:{novo:0,atualizado:0}, risco:{novo:0,atualizado:0}};
  (node.filhos||[]).forEach(f=>{
    if(f.status==="novo") t[f.tipo].novo++;
    else if(f.status==="atualizado") t[f.tipo].atualizado++;
    tallyDescendentesImportacao(f, t);
  });
  return t;
}
const __GENERO_TIPO_IMPORT = { area:"f", maquina:"f", tarefa:"f", risco:"m" };
const __NOMES_TIPO_IMPORT = { area:["área","áreas"], maquina:["máquina","máquinas"], tarefa:["tarefa","tarefas"], risco:["risco","riscos"] };
function resumoTallyImportacao(t, excluirTipo){
  const partes = [];
  ["area","maquina","tarefa","risco"].forEach(tipo=>{
    if(tipo===excluirTipo) return;
    const x = t[tipo]; const suf = __GENERO_TIPO_IMPORT[tipo]==="f" ? "a" : "o";
    if(x.novo>0) partes.push(`${x.novo} ${x.novo===1?__NOMES_TIPO_IMPORT[tipo][0]:__NOMES_TIPO_IMPORT[tipo][1]} nov${x.novo===1?suf:suf+"s"}`);
    if(x.atualizado>0) partes.push(`${x.atualizado} ${x.atualizado===1?__NOMES_TIPO_IMPORT[tipo][0]:__NOMES_TIPO_IMPORT[tipo][1]} atualizad${x.atualizado===1?suf:suf+"s"}`);
  });
  return partes.join(", ");
}
function __corStatusImportacao(status){
  if(status==="novo") return "var(--r-negligivel)";
  if(status==="atualizado") return "var(--r-medio)";
  return "var(--line-strong)";
}
function __rotuloStatusImportacao(status){
  if(status==="novo") return "Novo";
  if(status==="atualizado") return "Atualizado";
  if(status==="mais-recente-local") return "Mantido — sua versão é mais recente";
  return "Sem alteração";
}
function __linhaItemImportacao(node){
  const temFilhos = node.filhos && node.filhos.length>0;
  const resumo = temFilhos ? resumoTallyImportacao(tallyDescendentesImportacao(node), node.tipo) : "";
  const descricaoStatus = __rotuloStatusImportacao(node.status) + (resumo? " — "+resumo : "");
  return `<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)">
    <div style="width:8px;height:8px;border-radius:50%;background:${__corStatusImportacao(node.status)};margin-top:5px;flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:13px">${escapeHtml(node.nome)}</div>
      ${node.contexto? `<div style="font-size:11px;color:var(--ink-faint)">${escapeHtml(node.contexto)}</div>` : ""}
      <div style="font-size:11.5px;color:var(--ink-dim);margin-top:2px">${escapeHtml(descricaoStatus)}</div>
    </div>
  </div>`;
}
/* Novos sempre primeiro dentro de cada seção — facilita achar rápido o que
   realmente é conteúdo adicionado, sem precisar rolar past os "sem alteração". */
function __ordenarNovosPrimeiro(lista){
  const peso = s => s==="novo" ? 0 : s==="atualizado" ? 1 : 2;
  return [...lista].sort((a,b)=>peso(a.status)-peso(b.status));
}
function __secaoImportacao(titulo, lista){
  if(lista.length===0) return "";
  return `<details class="section">
    <summary><span class="num">${lista.length}</span>${titulo}<span class="chev">${ic('chev')}</span></summary>
    <div class="section-body">${__ordenarNovosPrimeiro(lista).map(__linhaItemImportacao).join("")}</div>
  </details>`;
}
/* Linha-resumo "Novos: 1 Área · 3 Máquinas · 2 Tarefas · 6 Riscos" — só entra
   os tipos que realmente têm item novo, na ordem da hierarquia. */
function __resumoNovosPorTipo(porTipo){
  const rotulos = { area:["Área","Áreas"], maquina:["Máquina","Máquinas"], tarefa:["Tarefa","Tarefas"], risco:["Risco","Riscos"] };
  const partes = [];
  ["area","maquina","tarefa","risco"].forEach(tipo=>{
    const n = porTipo[tipo].filter(x=>x.status==="novo").length;
    if(n>0) partes.push(`${n} ${n===1?rotulos[tipo][0]:rotulos[tipo][1]}`);
  });
  return partes.length? "Novos: " + partes.join(" · ") : "";
}
/* Modal de revisão: mostra o resultado da prévia e só aplica de verdade no
   STATE.projetosSimples quando o usuário confirma. Cancelar não deixa rastro
   nenhum — a cópia calculada é descartada. */
function __normalizarNomeImportacao(s){ return String(s||"").trim().toLowerCase(); }
/* Detecta áreas do arquivo importado que NÃO batem por id com nenhuma área já
   existente no mesmo projeto, mas têm o MESMO NOME de uma que já existe — o
   caso de dois celulares criando, cada um por conta, a "mesma" área/máquina
   física (mesmo ambiente, cadastrada duas vezes de forma independente). */
function __detectarCandidatosAreaImportacao(projetoExistente, areasIncoming){
  const candidatos = [];
  areasIncoming.forEach(areaInc=>{
    if(projetoExistente.areas.find(a=>a.id===areaInc.id)) return; // já é a mesma (por id) — merge normal resolve
    const nomeInc = __normalizarNomeImportacao(areaInc.nome);
    if(!nomeInc) return;
    const porNome = projetoExistente.areas.find(a=>__normalizarNomeImportacao(a.nome)===nomeInc);
    if(porNome) candidatos.push({ tipo:"area", idIncoming:areaInc.id, idExistente:porNome.id, nome:areaInc.nome, contexto:projetoExistente.empresa||"Projeto" });
  });
  return candidatos;
}
/* Mesma ideia, mas para máquinas dentro de uma área-alvo específica (a área
   já correta, depois de qualquer remapeamento decidido no passo anterior). */
function __detectarCandidatosMaquinaImportacao(areaExistenteAlvo, maquinasIncoming){
  const candidatos = [];
  maquinasIncoming.forEach(mInc=>{
    if(areaExistenteAlvo.maquinas.find(m=>m.id===mInc.id)) return;
    const nomeInc = __normalizarNomeImportacao(nomeMaquinaS(mInc));
    if(!nomeInc) return;
    const porNome = areaExistenteAlvo.maquinas.find(m=>__normalizarNomeImportacao(nomeMaquinaS(m))===nomeInc);
    if(porNome) candidatos.push({ tipo:"maquina", idIncoming:mInc.id, idExistente:porNome.id, nome:nomeMaquinaS(mInc), contexto:areaExistenteAlvo.nome||"Área" });
  });
  return candidatos;
}
/* Recalcula toda a prévia da importação a partir do zero, sempre a partir dos
   dados ORIGINAIS do arquivo (nunca acumula em cima de um cálculo anterior) —
   assim, mudar uma decisão de duplicata e recalcular dá sempre o mesmo
   resultado, não importa em que ordem as decisões foram tomadas.
   Passo 1: para cada área/máquina que o usuário já marcou como "é a mesma",
   troca o id dela (na cópia dos dados importados) pelo id do item existente
   correspondente — a partir daí, o merge normal por id já cuida de juntar os
   filhos dos dois lados sem duplicar nada.
   Passo 2: roda o merge normal (previewProjetosSimples) de sempre. */
function recalcularPreviewImportacao(){
  const pv = __importPreview;
  if(!pv) return;
  const dadosAjustados = JSON.parse(JSON.stringify(pv.dadosOriginais.projetosSimples || []));
  const candidatos = [];

  dadosAjustados.forEach(projInc=>{
    const projExistente = STATE.projetosSimples.find(p=>p.id===projInc.id);
    if(!projExistente || !Array.isArray(projInc.areas)) return;

    __detectarCandidatosAreaImportacao(projExistente, projInc.areas).forEach(c=>{
      candidatos.push(c);
      if((pv.decisoes["area:"+c.idIncoming]||"diferente")==="mesma"){
        projInc.areas.find(a=>a.id===c.idIncoming).id = c.idExistente;
      }
    });

    projInc.areas.forEach(areaInc=>{
      const areaAlvo = projExistente.areas.find(a=>a.id===areaInc.id); // já remapeada, se foi o caso
      if(!areaAlvo || !Array.isArray(areaInc.maquinas)) return;
      __detectarCandidatosMaquinaImportacao(areaAlvo, areaInc.maquinas).forEach(c=>{
        candidatos.push(c);
        if((pv.decisoes["maquina:"+c.idIncoming]||"diferente")==="mesma"){
          areaInc.maquinas.find(m=>m.id===c.idIncoming).id = c.idExistente;
        }
      });
    });
  });

  const stats = {add:0, igual:0, upd:0, mant:0};
  const clone = JSON.parse(JSON.stringify(STATE.projetosSimples));
  const relatorio = previewProjetosSimples(clone, dadosAjustados, stats);
  pv.candidatos = candidatos;
  pv.novoArrayProjetosSimples = clone;
  pv.dataCompleto = Array.isArray(pv.dadosOriginais.projetos) ? pv.dadosOriginais.projetos : [];
  pv.stats = stats;
  pv.porTipo = flattenRelatorioImportacao(relatorio);
}
function __linhaCandidatoDuplicataImportacao(c){
  const chave = c.tipo+":"+c.idIncoming;
  const decisaoAtual = (__importPreview.decisoes[chave]) || "diferente";
  const rotuloTipo = c.tipo==="area" ? "Área" : "Máquina";
  return `<div style="padding:10px 0;border-bottom:1px solid var(--line)">
    <div style="font-weight:700;font-size:13px">${escapeHtml(c.nome||"(sem nome)")}</div>
    <div style="font-size:11px;color:var(--ink-faint);margin-bottom:6px">${rotuloTipo} com esse nome já existe em ${escapeHtml(c.contexto)}, cadastrada separadamente</div>
    <div style="display:flex;gap:6px">
      <button class="btn ${decisaoAtual==='mesma'?'btn-primary':'btn-secondary'}" style="flex:1;font-size:12px;padding:8px" onclick="App.definirDecisaoDuplicataImportacao('${chave}','mesma')">É a mesma — juntar</button>
      <button class="btn ${decisaoAtual==='diferente'?'btn-primary':'btn-secondary'}" style="flex:1;font-size:12px;padding:8px" onclick="App.definirDecisaoDuplicataImportacao('${chave}','diferente')">São diferentes</button>
    </div>
  </div>`;
}
let __importPreview = null;

    <div class="card card-pad" style="margin-bottom:12px;background:var(--bg-soft)">

      ${__resumoNovosPorTipo(pv.porTipo)? `<div style="font-size:12.5px;color:var(--accent-ink);font-weight:700;margin-top:5px">${escapeHtml(__resumoNovosPorTipo(pv.porTipo))}</div>` : ""}

    </div>
    ${totalItens===0
      ? `<p style="font-size:13px;color:var(--ink-dim);text-align:center;padding:16px 0">Nenhum item do Módulo Simplificado neste arquivo.</p>`
      : `${__secaoImportacao(pv.porTipo.area.length===1?"Área":"Áreas", pv.porTipo.area)}
         ${__secaoImportacao(pv.porTipo.maquina.length===1?"Máquina":"Máquinas", pv.porTipo.maquina)}
         ${__secaoImportacao(pv.porTipo.tarefa.length===1?"Tarefa":"Tarefas", pv.porTipo.tarefa)}
         ${__secaoImportacao(pv.porTipo.risco.length===1?"Risco":"Riscos", pv.porTipo.risco)}`}
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-secondary" style="flex:1" onclick="App.cancelarImportacaoBackup()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="App.confirmarImportacaoBackup()">${ic('check')} Confirmar${totalAlteracoes+pv.dataCompleto.length>0? ` (${totalAlteracoes+pv.dataCompleto.length})`:''}</button>

}
function abrirRevisaoImportacao(dadosArquivo, nomeArquivo){
  __importPreview = { nomeArquivo, dadosOriginais: dadosArquivo, decisoes: {} };
  recalcularPreviewImportacao();
  abrirOverlay(screenModalImportacaoRevisao());
}

document.getElementById("fileImport").addEventListener("change", function(){
  const file = this.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || (!Array.isArray(data.projetos) && !Array.isArray(data.projetosSimples))) throw new Error("formato inválido");
      abrirRevisaoImportacao(data, file.name);
    }catch(e){
      alert("Não foi possível importar este arquivo. Verifique se é um backup válido (.json) gerado por este aplicativo.");
    }
  };
  reader.readAsText(file);
  this.value = "";
});

/* =========================================================================
   MIGRAÇÃO — versões anteriores (modelo plano Equipamento>Cenário, ou
   Projeto único + Equipamentos) são convertidas para a nova hierarquia
   Projeto > Área > Máquina > Tarefa > Perigo, sem perder nenhum dado.
   ========================================================================= */
function migrarParaHierarquiaV4(saved){
  if(Array.isArray(saved.projetos)) return saved; // já está no formato atual

  const equipamentosAntigos = saved.equipamentos || [];
  if(equipamentosAntigos.length===0) return { projetos:[], ui:{ screen:"projetos", projetoId:null, areaId:null, maquinaId:null, tarefaId:null, perigoId:null, tabelaScope:"tudo" } };

  const projetoAtual = saved.projetoAtual || {};
  const proj = novoProjeto();
  proj.empresa = projetoAtual.empresa || equipamentosAntigos[0].empresa || equipamentosAntigos[0].unidade || "";
  proj.cidade = projetoAtual.cidade || equipamentosAntigos[0].cidade || "";
  proj.responsavel = projetoAtual.responsavel || equipamentosAntigos[0].responsavel || "";
  proj.data = projetoAtual.data || equipamentosAntigos[0].dataServico || equipamentosAntigos[0].dataAvaliacao || hoje();

  const area = novaArea();
  area.nome = "Geral";

  equipamentosAntigos.forEach(eq=>{
    const m = novaMaquina();
    m.id = eq.id || m.id;
    m.fotoGeral = eq.fotoGeral || null;
    m.tag = eq.tag || "";
    m.nome = eq.nome===("__outro__") ? (eq.nomeOutro||"") : (eq.nome||"");
    m.descricao = eq.descricao || "";
    m.fabricante = eq.fabricante||""; m.modelo = eq.modelo||""; m.marca = eq.marca||""; m.numeroSerie = eq.numeroSerie||"";
    m.anoFabricacao = eq.anoFabricacao||""; m.capacidade = eq.capacidade||""; m.tensao = eq.tensao||"";

/* =========================================================================
   BLOQUEIO DO "PUXAR PARA BAIXO RECARREGA A PÁGINA" (pull-to-refresh)
   ========================================================================= */
/* O CSS "overscroll-behavior-y:none" (acima, em html/body/#app) já resolve isso
   na maioria dos celulares modernos. Esta camada em JS é um reforço para
   navegadores/Android mais antigos onde o CSS sozinho não é suficiente: ela
   detecta quando o dedo começa a arrastar para baixo estando no topo da tela
   (não há nada para rolar para cima) e bloqueia só esse gesto específico —
   sem interferir na rolagem normal do conteúdo, em modais, ou em qualquer
   outro toque do app. */
(function bloquearPullToRefresh(){
  let pontoYInicial = 0;
  document.addEventListener("touchstart", function(e){
    if(e.touches.length !== 1) return; // gestos com 2+ dedos (pinça/zoom) não são afetados
    pontoYInicial = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener("touchmove", function(e){
    if(e.touches.length !== 1) return;
    const yAtual = e.touches[0].clientY;
    const arrastandoParaBaixo = yAtual > pontoYInicial;
    const noTopoDaPagina = (window.scrollY || document.documentElement.scrollTop || 0) <= 0;
    // Só bloqueia quando: arrastando para baixo E já no topo (sem nada acima para
    // "puxar mais"). É exatamente essa combinação que o navegador interpreta como
    // pedido de recarregar a página.
    if(arrastandoParaBaixo && noTopoDaPagina){
      e.preventDefault();
    }
  }, {passive:false});
})();

    novoEstado.projetosSimples = Array.isArray(novoEstado.projetosSimples) ? novoEstado.projetosSimples : [];

    novoEstado.ui.areaSId = novoEstado.ui.areaSId || null;
    novoEstado.ui.maquinaSId = novoEstado.ui.maquinaSId || null;
    novoEstado.ui.tarefaSId = novoEstado.ui.tarefaSId || null;
    if(novoEstado.modulo===undefined){
      // Campo realmente inexistente (versão salva antes do conceito de módulo existir).

      novoEstado.modulo = null;

/* Selo de sincronização no cabeçalho: sem isso, o texto ("agora", "5min"...)
   só mudaria quando algo fosse editado (única coisa que disparava uma nova
   checagem). Dois timers cobrem isso:
   - a cada 30s, só atualiza o texto do tempo exibido (não toca disco);
   - a cada 2min (e sempre que a aba volta a ficar visível), faz uma checagem
     real na pasta — é o que detecta permissão perdida OU a pasta ter sido
     apagada no aparelho, mesmo sem nenhuma edição no meio do caminho. */
setInterval(()=>{ atualizarChipSync(); }, 30000);
setInterval(()=>{ if(document.visibilityState==="visible") sincronizarIncrementalNaPasta(); }, 120000);
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible") sincronizarIncrementalNaPasta();
});

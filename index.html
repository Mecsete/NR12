  clone.unshift({nome:"Fotos da Máquina/Ativo", colunas: ["Foto Geral", "Foto da Plaqueta"]}); // só as principais
  // Fotos extras vão para o final da planilha, em dois grupos separados.
  if(maxExtrasMaquina>0){
    const colunasExtraMaquina = [];
    for(let i=1;i<=maxExtrasMaquina;i++) colunasExtraMaquina.push(`Foto Extra da Máquina ${i}`);

  const colsFotoExtraMaquina = [];
  for(let i=1;i<=maxExtrasMaquina;i++) colsFotoExtraMaquina.push(headers.indexOf(`Foto Extra da Máquina ${i}`)+1);
  const colFotoRisco = headers.indexOf("Foto do Risco")+1;
  const colsFotoExtraRisco = [];
  for(let i=1;i<=maxExtrasRisco;i++) colsFotoExtraRisco.push(headers.indexOf(`Foto Extra do Risco ${i}`)+1);

  const imgMap = new Map();
  let mediaCounter = 0;
  async function registrar(dataUrl){
    if(!dataUrl || imgMap.has(dataUrl)) return;
    mediaCounter++;
    const dataUrlExport = await recomprimirParaExport(dataUrl);
    const dims = await getImageDims(dataUrlExport);
    const ext = dataUrlExport.startsWith("data:image/png") ? "png" : "jpeg";
    imgMap.set(dataUrl, { relId:"rIdImg"+mediaCounter, mediaName:`image${mediaCounter}.${ext}`, w:dims.w, h:dims.h, bytes:dataUrlToBytes(dataUrlExport), ext });
  }
  for(const item of linhasRaw){
    await registrar(item.maquina.fotoGeral);
    await registrar(item.maquina.fotoPlaqueta);
    for(const f of (item.maquina.fotosOutras||[])) await registrar(f);
    await registrar(item.risco.foto);
    for(const f of (item.risco.fotosOutras||[])) await registrar(f);
  }
  const anchors = []; // mantido por compatibilidade com a assinatura, não usado no modo Rich Data
  const dataRows = linhasRaw.map((item)=>{
    const row = linhaSimplesComFotos(item, maxExtrasMaquina, maxExtrasRisco);
    row[colFotoGeral-1]   = item.maquina.fotoGeral   || "Sem foto";
    row[colFotoPlaqueta-1] = item.maquina.fotoPlaqueta || "Sem foto";
    const extras = item.maquina.fotosOutras||[];
    colsFotoExtraMaquina.forEach((col,i)=>{ row[col-1] = extras[i] || ""; });
    row[colFotoRisco-1] = item.risco.foto || "Sem foto";
    const extrasRisco = item.risco.fotosOutras||[];
    colsFotoExtraRisco.forEach((col,i)=>{ row[col-1] = extrasRisco[i] || ""; });
    return row;
  });
  const colunasFoto = [colFotoGeral, colFotoPlaqueta, ...colsFotoExtraMaquina, colFotoRisco, ...colsFotoExtraRisco];
  return buildXlsxPackageSimples({grupos, headers, dataRows, anchors, imgMap, colunasFoto, resumoLinhasRaw:linhasRaw});
}

function camposFaltandoProjeto(p){
  return CAMPOS_ADMIN_PROJETO.filter(c => !p[c.campo] || !String(p[c.campo]).trim()).map(c=>c.label);

function projetosComCamposFaltando(idsAreasSelecionadas){
  const projetosUnicos = new Map();
  STATE.projetosSimples.forEach(p=>{
    const temAreaSelecionada = p.areas.some(a=>idsAreasSelecionadas.includes(a.id));
    if(!temAreaSelecionada) return;
    const faltando = camposFaltandoProjeto(p);

async function exportarSimplesXLSXFotos(){
  confirmarGeracaoComCamposFaltando(_exportarSimplesXLSXFotosReal);

async function _exportarSimplesXLSXFotosReal(){
  const idsSelecionados = getAreasSelecionadasExport();
  if(idsSelecionados.length===0){ toast("Selecione ao menos uma área em Configurações", false); return; }
  let linhasRaw = linhasEscopoSimples().filter(item=>idsSelecionados.includes(item.area.id));
  if(linhasRaw.length===0){ toast("Nada para exportar ainda", false); return; }
  toast("Gerando Excel por área… aguarde");
  if(getIAApiKey()){
    linhasRaw = await enriquecerLinhasComIA(linhasRaw, (i,total)=> toast(`Melhorando textos com IA… ${i}/${total}`));
  }
  try {
    const grupos = agruparLinhasPorArea(linhasRaw);
    const arquivos = [];
    for(let i=0;i<grupos.length;i++){
      const g = grupos[i];
      toast(`Gerando Excel… área ${i+1}/${grupos.length}: ${g.area.nome||"—"}`);
      const bytes = await gerarBytesXlsxSimples(g.linhas);
      arquivos.push({ name: nomeArquivoArea(g.proj, g.area, "xlsx"), data: bytes });
    }
    if(arquivos.length===1){
      const blob = new Blob([arquivos[0].data], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
      await compartilharOuBaixarBlob(blob, arquivos[0].name, blob.type, "Excel exportado");
    } else {
      const zipBytes = buildZip(arquivos);
      const blob = new Blob([zipBytes], {type:"application/zip"});
      await compartilharOuBaixarBlob(blob, `relatorios_excel_${hoje()}.zip`, blob.type, `${arquivos.length} arquivos Excel exportados em .zip`);
    }
  } catch(erroExport) {
    console.error("Erro ao gerar Excel com fotos (Módulo Simplificado):", erroExport);
    toast("Erro ao gerar o Excel: "+(erroExport && erroExport.message ? erroExport.message : String(erroExport)), false);
  }
}

/* =========================================================================
   EXPORTAÇÃO XLSX COM FOTOS — formato OOXML real (ZIP), gerado em JS puro.
   ========================================================================= */
const PX_TO_EMU = 9525;
const FOTO_CAIXA_W = 140, FOTO_CAIXA_H = 105;

const CRC_TABLE = (function(){
  const t = new Uint32Array(256);
  for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++){ c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); } t[n]=c; }
  return t;
})();
function crc32(bytes){
  let c = 0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++){ c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8); }
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function strToBytes(str){ return new TextEncoder().encode(str); }
function pushU16(arr,v){ arr.push(v&0xFF,(v>>>8)&0xFF); }
function pushU32(arr,v){ arr.push(v&0xFF,(v>>>8)&0xFF,(v>>>16)&0xFF,(v>>>24)&0xFF); }
function buildZip(files){
  const localParts = [], central = [];
  let offset = 0;
  files.forEach(f=>{
    const nameBytes = strToBytes(f.name);
    const data = f.data;
    const crc = crc32(data), size = data.length;
    const lh = [];
    pushU32(lh,0x04034b50); pushU16(lh,20); pushU16(lh,0); pushU16(lh,0);
    pushU16(lh,0); pushU16(lh,0x21);
    pushU32(lh,crc); pushU32(lh,size); pushU32(lh,size);
    pushU16(lh,nameBytes.length); pushU16(lh,0);
    const lhBytes = new Uint8Array(lh);
    const localOffset = offset;
    localParts.push(lhBytes, nameBytes, data);
    offset += lhBytes.length + nameBytes.length + data.length;

    const ch = [];
    pushU32(ch,0x02014b50); pushU16(ch,20); pushU16(ch,20); pushU16(ch,0); pushU16(ch,0);
    pushU16(ch,0); pushU16(ch,0x21);
    pushU32(ch,crc); pushU32(ch,size); pushU32(ch,size);
    pushU16(ch,nameBytes.length); pushU16(ch,0); pushU16(ch,0);
    pushU16(ch,0); pushU16(ch,0); pushU32(ch,0); pushU32(ch,localOffset);
    central.push(new Uint8Array(ch), nameBytes);
  });
  const centralOffset = offset;
  let centralSize = 0; central.forEach(b=>centralSize+=b.length);
  const eocd = [];
  pushU32(eocd,0x06054b50); pushU16(eocd,0); pushU16(eocd,0);
  pushU16(eocd,files.length); pushU16(eocd,files.length);
  pushU32(eocd,centralSize); pushU32(eocd,centralOffset); pushU16(eocd,0);
  const all = [...localParts, ...central, new Uint8Array(eocd)];
  let total = 0; all.forEach(b=>total+=b.length);
  const out = new Uint8Array(total);
  let p = 0; all.forEach(b=>{ out.set(b,p); p+=b.length; });
  return out;
}
function getImageDims(dataUrl){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=> resolve({w:img.naturalWidth||200, h:img.naturalHeight||200});
    img.onerror = ()=> resolve({w:200,h:200});
    img.src = dataUrl;
  });
}
/* Recomprime uma imagem já salva no projeto especificamente para uso em arquivos exportados
   (Excel/Word). As fotos já são comprimidas na captura (1920px/0.82), mas projetos com muitas
   fotos ainda podem gerar arquivos de dezenas de MB, que o celular recusa compartilhar
   ("Permission denied", sem aviso claro). Aqui aplicamos uma compressão adicional, mais agressiva
   (dimensão e qualidade menores), suficiente para visualização em relatório, mantendo a foto
   original (mais nítida) intacta no projeto — só a cópia embutida no arquivo exportado é menor. */
function recomprimirParaExport(dataUrl){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxDim = 1100;
      let {naturalWidth:width, naturalHeight:height} = img;
      if(width>height && width>maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
      else if(height>maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
      if(width===img.naturalWidth && height===img.naturalHeight && dataUrl.length < 220000){
        // Já é pequena o suficiente — evita reprocessar sem necessidade.
        resolve(dataUrl); return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img,0,0,width,height);
      resolve(canvas.toDataURL("image/jpeg", 0.62));
    };
    img.onerror = ()=> resolve(dataUrl);
    img.src = dataUrl;
  });
}
function dataUrlToBytes(dataUrl){
  const base64 = dataUrl.split(",")[1] || "";
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function colLetter(n){
  let s = "";
  while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); }
  return s;
}

   Exposição e Evitabilidade selecionáveis via dropdown (sugeridos pelo app,
   ajustáveis no Excel), Nível de Risco calculado por fórmula nativa do Excel
   (VLOOKUP numa tabela auxiliar oculta que replica a matriz oficial RIA TR
   R15.306 / ISO 13849-1), e cor condicional em todas as 3 colunas + resultado.
   ========================================================================= */
const RESUMO_HEADERS = ["Foto do Risco","Área","Máquina/Ativo","Tarefa","Risco","Descrição do Risco","Registro de Salvaguarda / Mitigação","Severidade","Exposição","Evitabilidade","Avaliação do Risco"];
/* 21 combinações válidas da matriz oficial, geradas a partir de TABELA_RISCO
   (já confirmada idêntica à fórmula do arquivo .xlsm oficial da Corteva). */
function gerarLinhasMatrizOficial(){
  const linhas = [];
  ["S1","S2","S3"].forEach(s=>{
    ["E0","E1","E2"].forEach(e=>{
      if(e==="E0"){
        ["A1","A2","A3"].forEach(a=> linhas.push([s+e+a, TABELA_RISCO[s].E0]) );
      } else {
        ["A1","A2","A3"].forEach(a=> linhas.push([s+e+a, TABELA_RISCO[s][e][a]]) );
      }
    });
  });
  return linhas;
}
function linhaResumo({proj,area,maquina,tarefa,risco}){
  const sev = sugerirSeveridade(risco.nome===OUTRO? risco.nomeOutro : risco.nome);
  const exp = sugerirExposicao(valOuOutro(tarefa.frequencia, tarefa.frequenciaOutro));
  const mitig = risco.medidaImplementada==="Sim" ? risco.descMedida : (risco.sugestaoMitigacao||"Sem medida de mitigação registrada");
  return [
    // coluna A (Foto do Risco) é preenchida à parte (anchors), aqui fica vazia
    "", area.nome, nomeMaquinaS(maquina), valOuOutro(tarefa.tarefa, tarefa.tarefaOutro),
    risco.nome===OUTRO? risco.nomeOutro : risco.nome, risco.descricao, mitig,
    rotuloPorCodigo(sev), rotuloPorCodigo(exp), rotuloPorCodigo("A3"), // Evitabilidade fixa em A3 (conservador)
  ];
}
function buildMatrizSheetXml(sstHelper){
  const linhas = gerarLinhasMatrizOficial();
  const cell = sstHelper.cell;
  let rows = `<row r="1">${cell(1,1,"Chave",null)}${cell(2,1,"NivelRisco",null)}</row>`;
  linhas.forEach((l,i)=>{
    const rn = i+2;
    rows += `<row r="${rn}">${cell(1,rn,l[0],null)}${cell(2,rn,l[1],null)}</row>`;
  });
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<dimension ref="A1:B${linhas.length+1}"/>
<sheetViews><sheetView workbookViewId="0"/></sheetViews>
<sheetFormatPr defaultRowHeight="15"/>
<sheetData>${rows}</sheetData>
</worksheet>`;
}
/* Constrói as 3 listas do dropdown (rótulos completos "S1 · Leve" etc, já
   separadas por vírgula) e o bloco de regras de cor condicional correspondente,
   reaproveitável tanto no Resumo (colunas H/I/J/K) quanto na Base Completa
   (colunas variáveis, por isso os parâmetros de coluna). */
function listaDropdown(lista){ return lista.map(o=>o.label).join(","); }
function blocoAvaliacaoRisco({colSev, colExp, colEvit, colResultado, primeiraLinha, ultimaLinha, dxfOffsetBase}){
  if(ultimaLinha < primeiraLinha) return { dataValidationsXml:"", cfXml:"", formula:()=>"" };
  const sqS = `${colSev}${primeiraLinha}:${colSev}${ultimaLinha}`;
  const sqE = `${colExp}${primeiraLinha}:${colExp}${ultimaLinha}`;
  const sqA = `${colEvit}${primeiraLinha}:${colEvit}${ultimaLinha}`;
  const sqR = `${colResultado}${primeiraLinha}:${colResultado}${ultimaLinha}`;
  const dataValidationsXml = `<dataValidations count="3">
<dataValidation type="list" allowBlank="1" showDropDown="0" showInputMessage="0" showErrorMessage="1" sqref="${sqS}"><formula1>"${listaDropdown(SEVERIDADE)}"</formula1></dataValidation>
<dataValidation type="list" allowBlank="1" showDropDown="0" showInputMessage="0" showErrorMessage="1" sqref="${sqE}"><formula1>"${listaDropdown(EXPOSICAO)}"</formula1></dataValidation>
<dataValidation type="list" allowBlank="1" showDropDown="0" showInputMessage="0" showErrorMessage="1" sqref="${sqA}"><formula1>"${listaDropdown(EVITABILIDADE)}"</formula1></dataValidation>
</dataValidations>`;
  function cfRule(dxfIdx, value, priority){
    return `<cfRule type="cellIs" dxfId="${dxfIdx}" priority="${priority}" operator="equal"><formula>"${escapeXml(value)}"</formula></cfRule>`;
  }
  let priority = dxfOffsetBase*10+1;
  const nivelLabels = ["NEGLIGÍVEL","BAIXO","MÉDIO","ALTO","MUITO ALTO"];
  const cfSev = `<conditionalFormatting sqref="${sqS}">${SEVERIDADE.map((o,i)=>cfRule(i,o.label,priority++)).join("")}</conditionalFormatting>`;
  const cfExp = `<conditionalFormatting sqref="${sqE}">${EXPOSICAO.map((o,i)=>cfRule(RESUMO_DXF_SEV.length+i,o.label,priority++)).join("")}</conditionalFormatting>`;
  const cfEvit = `<conditionalFormatting sqref="${sqA}">${EVITABILIDADE.map((o,i)=>cfRule(RESUMO_DXF_SEV.length+RESUMO_DXF_EXP.length+i,o.label,priority++)).join("")}</conditionalFormatting>`;
  const cfNivel = `<conditionalFormatting sqref="${sqR}">${nivelLabels.map((v,i)=>cfRule(RESUMO_DXF_SEV.length+RESUMO_DXF_EXP.length+RESUMO_DXF_EVIT.length+i,v,priority++)).join("")}</conditionalFormatting>`;
  function formula(rn){
    return `<c r="${colResultado}${rn}" t="str"><f>IFERROR(VLOOKUP(LEFT(${colSev}${rn},2)&amp;LEFT(${colExp}${rn},2)&amp;LEFT(${colEvit}${rn},2),_Matriz!$A$2:$B$28,2,FALSE),"")</f></c>`;
  }
  return { dataValidationsXml, cfXml: cfSev+cfExp+cfEvit+cfNivel, formula };
}
function buildResumoSheetXml(linhasRaw, sstHelper, anchorsOut, imgMapResumo){
  const cell = sstHelper.cell;
  const headerCells = RESUMO_HEADERS.map((h,i)=>cell(i+1,1,h,2)).join("");
  const n = linhasRaw.length;
  const lastDataRow = n+1;
  const avalia = blocoAvaliacaoRisco({colSev:"H", colExp:"I", colEvit:"J", colResultado:"K", primeiraLinha:2, ultimaLinha:lastDataRow, dxfOffsetBase:1});
  let dataXml = "";
  linhasRaw.forEach((item,idx)=>{
    const rn = idx+2;
    const row = linhaResumo(item); // [Foto(vazio), Área, Máquina, Tarefa, Risco, Descrição, Mitigação, Severidade, Exposição, Evitabilidade]
    const cells = row.map((v,i)=>{
      if(i===0){
        // coluna Foto do Risco: célula vazia (a imagem é ancorada por cima via drawing) ou "Sem foto"
        if(item.risco.foto && imgMapResumo.has(item.risco.foto)){
          anchorsOut.push({row:rn, col:1, info:imgMapResumo.get(item.risco.foto)});

    }).join("");
    dataXml += `<row r="${rn}" ht="85" customHeight="1">${cells}${avalia.formula(rn)}</row>`;

  const colsXml = `<cols><col min="1" max="1" width="20" customWidth="1"/><col min="6" max="7" width="40" customWidth="1"/><col min="2" max="5" width="20" customWidth="1"/><col min="8" max="11" width="16" customWidth="1"/></cols>`;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<dimension ref="A1:K${Math.max(lastDataRow,1)}"/>
<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>
<sheetFormatPr defaultRowHeight="85"/>
${colsXml}
<sheetData><row r="1">${headerCells}</row>${dataXml}</sheetData>
${n>0?`<autoFilter ref="A1:K${lastDataRow}"/>`:""}
${n>0?avalia.cfXml:""}
${n>0?avalia.dataValidationsXml:""}
<drawing r:id="rId2"/>
</worksheet>`;
}
function buildSstHelper(){
  const strings = []; const stringIndex = new Map();
  function internStr(v){
    if(v===""||v==null) return null;
    const s = String(v);
    if(stringIndex.has(s)) return stringIndex.get(s);
    const idx = strings.length; strings.push(s); stringIndex.set(s, idx); return idx;
  }
  function cell(col,row,value,styleIdx){
    const ref = colLetter(col)+row;
    const sAttr = styleIdx? ` s="${styleIdx}"` : "";
    const idx = internStr(value);
    if(idx===null) return `<c r="${ref}"${sAttr}/>`;
    return `<c r="${ref}"${sAttr} t="s"><v>${idx}</v></c>`;
  }
  return { cell, getStrings:()=>strings };
}
function buildSstXml(strings){
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${strings.length}" uniqueCount="${strings.length}">${strings.map(s=>`<si><t xml:space="preserve">${escapeXml(s)}</t></si>`).join("")}</sst>`;
}

function buildXlsxPackage({grupos, headers, dataRows, anchors, imgMap, colunasFoto}){
  const sst = buildSstHelper();

    if(span>1) merges.push(`${colLetter(colCursor)}1:${colLetter(colCursor+span-1)}1`);
    colCursor += span;
  });
  const row2Cells = headers.map((h,i)=>sst.cell(i+1,2,h,2)).join("");
  let dataXml = "";
  dataRows.forEach((row,idx)=>{
    const rn = idx+3;
    const cells = row.map((v,i)=>sst.cell(i+1,rn,v,null)).join("");
    dataXml += `<row r="${rn}" ht="85" customHeight="1">${cells}</row>`;
  });
  const mergeCellsXml = merges.length? `<mergeCells count="${merges.length}">${merges.map(m=>`<mergeCell ref="${m}"/>`).join("")}</mergeCells>` : "";
  const totalCols = headers.length, totalRows = dataRows.length+2;
  const colsXml = `<cols>${colunasFoto.map(c=>`<col min="${c}" max="${c}" width="20" customWidth="1"/>`).join("")}</cols>`;
  const sheetXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<dimension ref="A1:${colLetter(totalCols)}${totalRows}"/>
<sheetViews><sheetView workbookViewId="0"/></sheetViews>
<sheetFormatPr defaultRowHeight="15"/>
${colsXml}
<sheetData><row r="1">${row1Cells}</row><row r="2">${row2Cells}</row>${dataXml}</sheetData>
${mergeCellsXml}
<drawing r:id="rId1"/>
</worksheet>`;
  const sstXml = buildSstXml(sst.getStrings());
  const files = [
    {name:"[Content_Types].xml", data: strToBytes(buildContentTypesXml(imgMap))},
    {name:"_rels/.rels", data: strToBytes(XLSX_RELS_ROOT)},
    {name:"docProps/core.xml", data: strToBytes(XLSX_CORE_PROPS)},
    {name:"docProps/app.xml", data: strToBytes(XLSX_APP_PROPS)},
    {name:"xl/workbook.xml", data: strToBytes(XLSX_WORKBOOK)},
    {name:"xl/_rels/workbook.xml.rels", data: strToBytes(XLSX_WORKBOOK_RELS)},
    {name:"xl/styles.xml", data: strToBytes(XLSX_STYLES)},
    {name:"xl/sharedStrings.xml", data: strToBytes(sstXml)},
    {name:"xl/worksheets/sheet1.xml", data: strToBytes(sheetXml)},
    {name:"xl/worksheets/_rels/sheet1.xml.rels", data: strToBytes(XLSX_SHEET_RELS)},
    {name:"xl/drawings/drawing1.xml", data: strToBytes(buildDrawingXml(anchors))},
    {name:"xl/drawings/_rels/drawing1.xml.rels", data: strToBytes(buildDrawingRelsXml(imgMap))},
  ];
  imgMap.forEach(info=> files.push({name:`xl/media/${info.mediaName}`, data: info.bytes}) );
  return buildZip(files);
}

const XLSX_STYLE_HEADER = 1;      // cabeçalho: fundo navy, texto branco, borda, centralizado
const XLSX_STYLE_DATA_ABREV = 2;  // célula de data: formato "Data Abreviada" + borda + centralizado

// Converte "AAAA-MM-DD" (formato do <input type="date">) para o número serial de data do Excel
// (dias desde 1899-12-30, contagem usada internamente pelo Excel/OOXML).
function dataParaSerialExcel(strIso){
  if(!strIso || typeof strIso!=="string") return null;
  const m = strIso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  const [,y,mo,d] = m;
  const utcMs = Date.UTC(Number(y),Number(mo)-1,Number(d));
  const epochMs = Date.UTC(1899,11,30);
  const serial = Math.round((utcMs-epochMs)/86400000);
  return serial>0 ? serial : null;
}

/* ── Aba de apoio oculta "_MatrizHRN" ────────────────────────────────────
   Guarda o valor numérico de cada classificação (PO/FE/GPD/NP) para que o
   HRN e o Nível de Risco sejam FÓRMULAS de Excel (VLOOKUP + IFS), não valores
   fixos — assim, se o usuário trocar uma opção no dropdown da planilha, o
   HRN e o Nível recalculam sozinhos. Layout (colunas):
     A:B = PO (nome/valor)   C:D = FE (nome/valor)
     E:F = GPD (nome/valor)  G:H = NP (nome/valor)
   Faixas de nível ficam fixas nas fórmulas (IFS), não precisam de lookup. */
function buildMatrizHrnSheetXml(sstHelper){
  const cell = sstHelper.cell;
  const colunas = [
    HRN_PO_TABELA.map(x=>[x.classificacao,x.valor]),
    HRN_FE_TABELA.map(x=>[x.classificacao,x.valor]),
    HRN_GPD_TABELA.map(x=>[x.classificacao,x.valor]),
    HRN_NP_TABELA.map(x=>[x.classificacao,x.valor]),
  ];
  const maxLen = Math.max(...colunas.map(c=>c.length));
  const headerLabels = ["PO","","FE","","GPD","","NP",""];
  let rows = `<row r="1">${headerLabels.map((h,i)=> h? cell(i+1,1,h,null) : "").join("")}</row>`;
  for(let r=0;r<maxLen;r++){
    const rn = r+2;
    let cells = "";
    colunas.forEach((col,ci)=>{
      const baseCol = ci*2+1;
      const item = col[r];
      if(item){
        cells += cell(baseCol,rn,item[0],null);
        cells += `<c r="${colLetter(baseCol+1)}${rn}" t="n"><v>${item[1]}</v></c>`;
      }
    });
    rows += `<row r="${rn}">${cells}</row>`;
  }
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<dimension ref="A1:H${maxLen+1}"/>
<sheetViews><sheetView workbookViewId="0"/></sheetViews>
<sheetFormatPr defaultRowHeight="15"/>
<sheetData>${rows}</sheetData>
</worksheet>`;
}
/* Fórmula de Excel para o HRN: multiplica o valor numérico (buscado por VLOOKUP
   na _MatrizHRN) de cada uma das 4 colunas de classificação da própria linha. */
function formulaHrn(colPO,colFE,colGPD,colNP,rn){
  const vlk=(col,range)=>`VLOOKUP(${colLetter(col)}${rn},_MatrizHRN!${range},2,0)`;
  return `${vlk(colPO,"$A$2:$B$9")}*${vlk(colFE,"$C$2:$D$7")}*${vlk(colGPD,"$E$2:$F$8")}*${vlk(colNP,"$G$2:$H$6")}`;
}
/* Fórmula de Excel para o Nível de Risco, replicando nivelHRN() em JS:
   >=500 INACEITÁVEL, >=50 ALTO, >=5 BAIXO, senão DESPREZÍVEL. */
function formulaNivelHrn(colHrn,rn){
  const ref=`${colLetter(colHrn)}${rn}`;
  return `IF(${ref}>=500,"INACEITÁVEL",IF(${ref}>=50,"ALTO",IF(${ref}>=5,"BAIXO","DESPREZÍVEL")))`;
}

          if(drawingAnchors) drawingAnchors.push({row:rn, col, dataUrl:val});
        } else {
          cells.push(sst.cell(col,rn,'Sem foto',XLSX_STYLE_DADOS));
        }
      } else if(col===hrnColHRN){
        // HRN como FÓRMULA (VLOOKUP na _MatrizHRN) — recalcula se PO/FE/GPD/NP mudarem
        cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_DADOS}" t="n"><f>${escapeXml(formulaHrn(hrnColPO,hrnColFE,hrnColGPD,hrnColNP,rn))}</f></c>`);
      } else if(col===hrnColNivel){
        // Nível de Risco como FÓRMULA, dependente do HRN calculado na mesma linha
        cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_DADOS}" t="str"><f>${escapeXml(formulaNivelHrn(hrnColHRN,rn))}</f></c>`);
      } else {
        cells.push(sst.cell(col,rn,val||'',XLSX_STYLE_DADOS));
      }
    });
    dataXml+=`<row r="${rn}" ht="70" customHeight="1">${cells.join('')}</row>`;
  });

  // Dropdowns (dataValidation)
  function dv(col, opts){
    const sqref=`${colLetter(col)}2:${colLetter(col)}${nrows+1}`;
    return `<dataValidation type="list" allowBlank="1" showInputMessage="1" showErrorMessage="1" sqref="${sqref}"><formula1>"${escapeXml(opts.join(','))}"</formula1></dataValidation>`;
  }
  const dvXml=`<dataValidations count="4">`+
    dv(hrnColPO,HRN_PO_OPTS)+dv(hrnColFE,HRN_FE_OPTS)+
    dv(hrnColGPD,HRN_GPD_OPTS)+dv(hrnColNP,HRN_NP_OPTS)+
    `</dataValidations>`;

  // Formatação condicional
  function cfBlock(col, opts, dxfStart){
    const sqref=`${colLetter(col)}2:${colLetter(col)}${nrows+1}`;
    const rules=opts.map((v,i)=>
      `<cfRule type="cellIs" dxfId="${dxfStart+i}" priority="${(dxfStart+i)*10+1}" operator="equal"><formula>"${escapeXml(v)}"</formula></cfRule>`
    ).join('');
    return `<conditionalFormatting sqref="${sqref}">${rules}</conditionalFormatting>`;
  }
  const nivelOpts=["DESPREZÍVEL","BAIXO","ALTO","INACEITÁVEL"];
  // dxf offsets: PO=0..7, FE=8..13, GPD=14..20, NP=21..25, Nível=26..29
  const cfXml=cfBlock(hrnColPO,HRN_PO_OPTS,0)+cfBlock(hrnColFE,HRN_FE_OPTS,8)+
    cfBlock(hrnColGPD,HRN_GPD_OPTS,14)+cfBlock(hrnColNP,HRN_NP_OPTS,21)+
    cfBlock(hrnColNivel,nivelOpts,HRN_DXF_NIVEL_START);

  // Larguras de coluna replicando o modelo padrão MecSete (largura em "caracteres").
  const LARGURA_RESUMO = {
    "Foto do Risco":16, "Área":9.14, "Máquina/Ativo":17.71, "Tarefa":19.29, "Risco":13,
    "Descrição do Risco":23.29, "Registro de Salvaguarda / Mitigação":19.57,
    "Probabilidade":12.29, "Frequência":13, "Grau do Dano":15.71, "Número de Pessoas":12.86,
    "HRN":9.14, "Nível de Risco":13,
  };
  const fotoCols=headers.map((h,i)=>`<col min="${i+1}" max="${i+1}" width="${LARGURA_RESUMO[h]||16}" customWidth="1"/>`).join('');
  const af=`<autoFilter ref="A1:${colLetter(ncols)}${nrows+1}"/>`;

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
    `<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">`+
    `<dimension ref="A1:${colLetter(ncols)}${nrows+1}"/>`+
    `<sheetViews><sheetView showGridLines="0" workbookViewId="0">`+
    `<pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/>`+
    `</sheetView></sheetViews><sheetFormatPr defaultRowHeight="15"/>`+
    `<cols>${fotoCols}</cols>`+
    `<sheetData><row r="1">${hdr}</row>${dataXml}</sheetData>`+
    `${af}${cfXml}${nrows>0?dvXml:''}`+
    `<drawing r:id="${sheetDrawingRId}"/></worksheet>`;
}

/* ── Builder completo do XLSX — fotos como objeto real + HRN em fórmula ──── */
function buildXlsxPackageSimples({grupos, headers, dataRows, anchors, imgMap, colunasFoto, resumoLinhasRaw}){
  // imgMap: Map<dataUrl, {relId, mediaName, w, h, bytes, ext}>
  const imgList=[...imgMap.values()];
  const dataUrlToMediaName=new Map([...imgMap.entries()].map(([url,info])=>[url,info.mediaName]));

  // SST compartilhado
  const sst=buildSstHelper();

  // ── Resumo ────────────────────────────────────────────────────────────────
  const resumoDrawingAnchors=[];
  const resumoRows=(resumoLinhasRaw||[]).map(item=>{
    const {po,fe,gpd,np}=hrnDoItem(item);
    const mitig=item.risco.medidaImplementada==="Sim"?item.risco.descMedida:(item.risco.sugestaoMitigacao||"Não informado.");
    const nomeRisco=item.risco.nome===OUTRO?item.risco.nomeOutro:item.risco.nome;
    return [
      item.risco.foto||'Sem foto',
      item.area.nome, nomeMaquinaS(item.maquina),
      valOuOutro(item.tarefa.tarefa,item.tarefa.tarefaOutro),
      nomeRisco, item.risco.descricao, mitig,
      labelHRN(HRN_PO_OPTS,po,HRN_PO_TABELA), labelHRN(HRN_FE_OPTS,fe,HRN_FE_TABELA), labelHRN(HRN_GPD_OPTS,gpd,HRN_GPD_TABELA), labelHRN(HRN_NP_OPTS,np,HRN_NP_TABELA),
      '', '', // HRN e Nível preenchidos por fórmula em buildHrnSheetXml
    ];
  });

  const sheet2Xml=buildHrnSheetXml({
    sst, headers:RESUMO_HEADERS_HRN, rows:resumoRows,
    fotoColsSet:FOTO_COLS_RESUMO,
    hrnColPO:RESUMO_COL_PO, hrnColFE:RESUMO_COL_FE, hrnColGPD:RESUMO_COL_GPD, hrnColNP:RESUMO_COL_NP,
    hrnColHRN:RESUMO_COL_HRN, hrnColNivel:RESUMO_COL_NIVEL,
    drawingAnchors:resumoDrawingAnchors,
    sheetDrawingRId:'rId1',
  });

  // ── Base Completa (sheet1) ────────────────────────────────────────────────
  const fotoColsBase=new Set(colunasFoto);
  const baseDrawingAnchors=[];
  let colCursor=1, row1Cells=''; const merges=[];
  grupos.forEach(g=>{
    const span=g.colunas.length;
    row1Cells+=sst.cell(colCursor,1,g.nome,XLSX_STYLE_HEADER);
    if(span>1) merges.push(`${colLetter(colCursor)}1:${colLetter(colCursor+span-1)}1`);
    colCursor+=span;
  });
  const row2Cells=headers.map((h,i)=>sst.cell(i+1,2,h,XLSX_STYLE_HEADER)).join('');

  // Colunas HRN na Base Completa
  const hPO=headers.indexOf("Probabilidade")+1, hFE=headers.indexOf("Frequência")+1;
  const hGPD=headers.indexOf("Grau do Dano")+1, hNP=headers.indexOf("Número de Pessoas")+1;
  const hHRN=headers.indexOf("HRN")+1, hNivel=headers.indexOf("Nível de Risco")+1;
  const hData=headers.indexOf("Data")+1; // vira número serial + formato "Data Abreviada" (não texto)

  let baseDataXml='';
  dataRows.forEach((row,idx)=>{
    const rn=idx+3; const cells=[];
    row.forEach((val,ci)=>{
      const col=ci+1;
      if(fotoColsBase.has(col)){
        if(val && val!=='Sem foto' && val!==''){
          cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_CENTRO_SEM_BORDA}"/>`);
          baseDrawingAnchors.push({row:rn, col, dataUrl:val});
        } else {
          cells.push(sst.cell(col,rn,'Sem foto',XLSX_STYLE_DADOS));
        }
      } else if(col===hHRN && hPO){
        // HRN como FÓRMULA (VLOOKUP na _MatrizHRN)
        cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_DADOS}" t="n"><f>${escapeXml(formulaHrn(hPO,hFE,hGPD,hNP,rn))}</f></c>`);
      } else if(col===hNivel && hPO){
        // Nível de Risco como FÓRMULA, dependente da coluna HRN da mesma linha
        cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_DADOS}" t="str"><f>${escapeXml(formulaNivelHrn(hHRN,rn))}</f></c>`);
      } else if(col===hData && dataParaSerialExcel(val)!==null){
        // Data como número serial real do Excel + estilo "Data Abreviada" (não texto)
        cells.push(`<c r="${colLetter(col)}${rn}" s="${XLSX_STYLE_DATA_ABREV}" t="n"><v>${dataParaSerialExcel(val)}</v></c>`);
      } else {
        cells.push(sst.cell(col,rn,val||'',XLSX_STYLE_DADOS));
      }
    });
    baseDataXml+=`<row r="${rn}" ht="70" customHeight="1">${cells.join('')}</row>`;
  });

  const totalCols=headers.length, totalRows=dataRows.length+2;
  const mergeCellsXml=merges.length?`<mergeCells count="${merges.length}">${merges.map(m=>`<mergeCell ref="${m}"/>`).join('')}</mergeCells>`:'';
  // Larguras de coluna replicando o modelo padrão MecSete (largura em "caracteres").
  const LARGURA_POR_HEADER = {
    "Foto Geral":16, "Foto da Plaqueta":16, "Empresa/Unidade":10.86, "Cidade":13,
    "Responsável":11.29, "Data":13, "Área":13, "Local":13,
    "Nome da Máquina/Ativo":15, "Descrição da Máquina/Ativo":14.57, "Escopo do Equipamento":13,
    "Manual de Operação":10.86, "Tarefa":13.43, "Descrição da Tarefa":16.86,
    "Nº de Pessoas":8.71, "Frequência":13.43, "Nome do Risco":14, "Descrição do Risco":14.57,
    "Foto do Risco":16, "Há Medida de Mitigação?":15.86, "Descrição da Medida Existente":14.43,
    "Sugestão de Mitigação":16.29, "Probabilidade":11.14, "Grau do Dano":13, "Número de Pessoas":13,
    "HRN":7.14, "Nível de Risco":13,
  };
  const colsXmlBase = headers.map((h,i)=>{
    const largura = fotoColsBase.has(i+1) ? (LARGURA_POR_HEADER[h]||16) : (LARGURA_POR_HEADER[h]||13);
    return `<col min="${i+1}" max="${i+1}" width="${largura}" customWidth="1"/>`;
  }).join('');

  function dvBase(col, opts){
    if(!col) return '';
    const sqref=`${colLetter(col)}3:${colLetter(col)}${totalRows}`;
    return `<dataValidation type="list" allowBlank="1" showInputMessage="1" showErrorMessage="1" sqref="${sqref}"><formula1>"${escapeXml(opts.join(','))}"</formula1></dataValidation>`;
  }
  const dvBaseXml=hPO?`<dataValidations count="4">`+dvBase(hPO,HRN_PO_OPTS)+dvBase(hFE,HRN_FE_OPTS)+dvBase(hGPD,HRN_GPD_OPTS)+dvBase(hNP,HRN_NP_OPTS)+`</dataValidations>`:'';

  const nivelOpts2=["DESPREZÍVEL","BAIXO","ALTO","INACEITÁVEL"];
  function cfBase(col,opts,dxfStart){
    if(!col) return '';
    const sqref=`${colLetter(col)}3:${colLetter(col)}${totalRows}`;
    const rules=opts.map((v,i)=>`<cfRule type="cellIs" dxfId="${dxfStart+i}" priority="${(dxfStart+i)*10+2}" operator="equal"><formula>"${escapeXml(v)}"</formula></cfRule>`).join('');
    return `<conditionalFormatting sqref="${sqref}">${rules}</conditionalFormatting>`;
  }
  const cfBaseXml=cfBase(hPO,HRN_PO_OPTS,0)+cfBase(hFE,HRN_FE_OPTS,8)+cfBase(hGPD,HRN_GPD_OPTS,14)+cfBase(hNP,HRN_NP_OPTS,21)+cfBase(hNivel,nivelOpts2,HRN_DXF_NIVEL_START);

  const afBase=dataRows.length>0?`<autoFilter ref="A2:${colLetter(totalCols)}${totalRows}"/>`:'';

  const sheet1Xml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
    `<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">`+
    `<dimension ref="A1:${colLetter(totalCols)}${totalRows}"/>`+
    `<sheetViews><sheetView showGridLines="0" workbookViewId="0">`+
    `<pane ySplit="2" topLeftCell="A3" activePane="bottomLeft" state="frozen"/>`+
    `</sheetView></sheetViews><sheetFormatPr defaultRowHeight="15"/>`+
    `<cols>${colsXmlBase}</cols>`+
    `<sheetData><row r="1">${row1Cells}</row><row r="2">${row2Cells}</row>${baseDataXml}</sheetData>`+
    `${afBase}${mergeCellsXml}${cfBaseXml}${dvBaseXml}`+
    `<drawing r:id="rId1"/></worksheet>`;

  // ── _MatrizHRN (sheet3, oculta) ──────────────────────────────────────────
  const sheet3Xml = buildMatrizHrnSheetXml(sst);

  // ── Shared strings, workbook, rels ───────────────────────────────────────
  const nResumo=(resumoLinhasRaw||[]).length;
  const sheetDefs=[
    {name:"Base Completa",sheetId:1,rId:"rId1"},
    {name:"Resumo",sheetId:2,rId:"rId2"},
    {name:"_MatrizHRN",sheetId:3,rId:"rId5",hidden:true},
  ];
  const definedNames=[
    ...(dataRows.length>0?[{localSheetId:0,ref:`'Base Completa'!$A$2:$${colLetter(totalCols)}$${totalRows}`}]:[]),
    ...(nResumo>0?[{localSheetId:1,ref:`Resumo!$A$1:$${colLetter(RESUMO_HEADERS_HRN.length)}$${nResumo+1}`}]:[]),
  ];
  const workbookXml=buildWorkbookXml(sheetDefs,definedNames);

  const wbRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
    `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">`+
    `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>`+
    `<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet2.xml"/>`+
    `<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`+
    `<Relationship Id="rId4" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>`+
    `<Relationship Id="rId5" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet3.xml"/>`+
    `</Relationships>`;

  const shRels=(n)=>`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
    `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">`+
    `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing" Target="../drawings/drawing${n}.xml"/>`+
    `</Relationships>`;

  const ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
    `<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">`+
    `<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>`+
    `<Default Extension="xml" ContentType="application/xml"/>`+
    `<Default Extension="jpeg" ContentType="image/jpeg"/>`+
    `<Default Extension="png" ContentType="image/png"/>`+
    `<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>`+
    `<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`+
    `<Override PartName="/xl/worksheets/sheet2.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`+
    `<Override PartName="/xl/worksheets/sheet3.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`+
    `<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>`+
    `<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>`+
    `<Override PartName="/xl/drawings/drawing1.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/>`+
    `<Override PartName="/xl/drawings/drawing2.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/>`+
    `<Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>`+
    `<Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>`+
    `</Types>`;

  // Base Completa e Resumo compartilham as mesmas fotos (Foto Geral/Plaqueta/Risco
  // repetidas nas duas abas); cada aba precisa do seu próprio drawingN.xml + rels,
  // mas reaproveitam o mesmo imgMap (mesmo relId por imagem em cada drawing).
  function buildDrawingRelsForImgs(anchorsList){
    const used = new Map();
    anchorsList.forEach(a=>{
      const info = imgMap.get(a.dataUrl);
      if(info && !used.has(info.mediaName)) used.set(info.mediaName, info.relId);
    });
    const rels = [...used.entries()].map(([mediaName,relId])=>
      `<Relationship Id="${relId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${mediaName}"/>`
    ).join('');
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`+
      `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${rels}</Relationships>`;
  }
  function buildDrawingXmlForAnchors(anchorsList){
    let shapeId=0;
    const items = anchorsList.map(a=>{
      const info = imgMap.get(a.dataUrl);
      if(!info) return '';
      shapeId++;
      const c0=a.col-1, r0=a.row-1;
      // oneCellAnchor + editAs="oneCell" = "Colocar na célula" no Excel: a imagem fica
      // presa à célula de origem e ACOMPANHA a linha ao ordenar/classificar a coluna
      // (ao contrário de twoCellAnchor sem editAs, que só acompanha redimensionamento).
      // Conversão largura de coluna (unidade "caracteres", fonte Calibri 11 = MDW 7px)
      // para pixels: TRUNC(((256*width + TRUNC(128/MDW))/256) * MDW); depois pixels→EMU (×9525).
      // Altura de linha já vem em pontos (ht); 1 ponto = 12700 EMU.
      const larguraColunaChars = 16, MDW = 7;
      const larguraColunaPx = Math.trunc(((256*larguraColunaChars + Math.trunc(128/MDW))/256) * MDW);
      const colWidthEMU = larguraColunaPx * 9525;
      const rowHeightEMU = 70 * 12700; // altura de linha ht=70 (pontos) em EMU
      const margemEMU = 19050; // ~1,5pt de cada lado — célula fica visivelmente maior que a foto
      const ext = { cx: colWidthEMU-margemEMU*2, cy: rowHeightEMU-margemEMU*2 };
      return `<xdr:oneCellAnchor>
<xdr:from><xdr:col>${c0}</xdr:col><xdr:colOff>19050</xdr:colOff><xdr:row>${r0}</xdr:row><xdr:rowOff>19050</xdr:rowOff></xdr:from>
<xdr:ext cx="${ext.cx}" cy="${ext.cy}"/>
<xdr:pic>
<xdr:nvPicPr><xdr:cNvPr id="${shapeId}" name="Foto${shapeId}"/><xdr:cNvPicPr/></xdr:nvPicPr>
<xdr:blipFill><a:blip xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:embed="${info.relId}"/><a:stretch xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:fillRect/></a:stretch></xdr:blipFill>
<xdr:spPr><a:prstGeom xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" prst="rect"><a:avLst/></a:prstGeom></xdr:spPr>
</xdr:pic>
<xdr:clientData/>
</xdr:oneCellAnchor>`;
    }).join('');
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing">${items}</xdr:wsDr>`;
  }

  const files=[
    {name:"[Content_Types].xml", data:strToBytes(ct)},
    {name:"_rels/.rels", data:strToBytes(XLSX_RELS_ROOT)},
    {name:"docProps/core.xml", data:strToBytes(XLSX_CORE_PROPS)},
    {name:"docProps/app.xml", data:strToBytes(buildAppPropsMulti())},
    {name:"xl/workbook.xml", data:strToBytes(workbookXml)},
    {name:"xl/_rels/workbook.xml.rels", data:strToBytes(wbRels)},
    {name:"xl/styles.xml", data:strToBytes(buildResumoStylesXml())},
    {name:"xl/sharedStrings.xml", data:strToBytes(buildSstXml(sst.getStrings()))},
    {name:"xl/worksheets/sheet1.xml", data:strToBytes(sheet1Xml)},
    {name:"xl/worksheets/_rels/sheet1.xml.rels", data:strToBytes(shRels(1))},
    {name:"xl/worksheets/sheet2.xml", data:strToBytes(sheet2Xml)},
    {name:"xl/worksheets/_rels/sheet2.xml.rels", data:strToBytes(shRels(2))},
    {name:"xl/worksheets/sheet3.xml", data:strToBytes(sheet3Xml)},
    {name:"xl/drawings/drawing1.xml", data:strToBytes(buildDrawingXmlForAnchors(baseDrawingAnchors))},
    {name:"xl/drawings/_rels/drawing1.xml.rels", data:strToBytes(buildDrawingRelsForImgs(baseDrawingAnchors))},
    {name:"xl/drawings/drawing2.xml", data:strToBytes(buildDrawingXmlForAnchors(resumoDrawingAnchors))},
    {name:"xl/drawings/_rels/drawing2.xml.rels", data:strToBytes(buildDrawingRelsForImgs(resumoDrawingAnchors))},
  ];
  imgMap.forEach(info=>files.push({name:`xl/media/${info.mediaName}`,data:info.bytes}));
  return buildZip(files);
}
async function exportarMasterXLSXFotos(){
  toast("Gerando Excel com fotos… aguarde");
  const linhasRaw = linhasEscopo("tudo");
  const grupos = buildGruposFotos();
  const headers = grupos.flatMap(g=>g.colunas);
  const colFotoEquip = headers.indexOf("Foto da Máquina/Ativo")+1;
  const colFotoRisco = headers.indexOf("Foto do Risco")+1;

  const imgMap = new Map();
  let mediaCounter = 0;
  async function registrar(dataUrl){
    if(!dataUrl || imgMap.has(dataUrl)) return;
    mediaCounter++;
    const dims = await getImageDims(dataUrl);
    const ext = dataUrl.startsWith("data:image/png") ? "png" : "jpeg";
    imgMap.set(dataUrl, { relId:"rIdImg"+mediaCounter, mediaName:`image${mediaCounter}.${ext}`, w:dims.w, h:dims.h, bytes:dataUrlToBytes(dataUrl), ext });
  }
  for(const item of linhasRaw){
    await registrar(item.maquina.fotoGeral);
    await registrar(item.perigo.fotos && item.perigo.fotos[0]);
  }
  const anchors = [];
  const dataRows = linhasRaw.map((item, idx)=>{
    const row = linhaMasterComFotos(item, idx);
    const rn = idx+3;
    if(item.maquina.fotoGeral) anchors.push({row:rn, col:colFotoEquip, info:imgMap.get(item.maquina.fotoGeral)});
    else row[colFotoEquip-1] = "Sem foto";
    const fotoRisco = item.perigo.fotos && item.perigo.fotos[0];

  const url = URL.createObjectURL(blob);

function corrigirTextoMecanico(texto){
  if(!texto) return texto;
  let t = String(texto);
  t = t.replace(/[ \t]+/g," ");
  t = t.replace(/ +([,.;:!?])/g,"$1");
  t = t.replace(/([,.;:!?])(?=[^\s])/g,"$1 ");
  t = t.replace(/\n{3,}/g,"\n\n");
  t = t.split("\n").map(linha=>{
    let l = linha.replace(/^\s+|\s+$/g,"");
    if(l.length===0) return l;
    l = l.charAt(0).toUpperCase()+l.slice(1);
    l = l.replace(/([.!?]\s+)([a-zà-ÿ])/g, (m,p1,p2)=> p1+p2.toUpperCase());
    if(!/[.!?:]$/.test(l)) l = l+".";
    return l;
  }).join("\n");
  return t.trim();
}
// Variante para títulos curtos (nome do risco): não força ponto final.
function corrigirNomeRisco(texto){
  if(!texto) return texto;
  let t = String(texto).replace(/[ \t]+/g," ").trim();
  if(t.length===0) return t;
  t = t.charAt(0).toUpperCase()+t.slice(1);
  t = t.replace(/\s+([,.;:!?])/g,"$1");
  return t.replace(/[.\s]+$/,"");
}

// ---------- numeração hierárquica Máquina.Tarefa.Risco (1.1.1) ----------
function numerarHierarquiaSimples(linhasRaw){
  const numMaquina = new Map(), numTarefa = new Map(), numRisco = new Map();
  let nMaquina = 0;
  linhasRaw.forEach(({maquina})=>{ if(!numMaquina.has(maquina.id)){ nMaquina++; numMaquina.set(maquina.id, nMaquina); } });
  const tarefaCounterPorMaquina = new Map();
  linhasRaw.forEach(({maquina,tarefa})=>{
    if(!numTarefa.has(tarefa.id)){
      const atual = (tarefaCounterPorMaquina.get(maquina.id)||0)+1;
      tarefaCounterPorMaquina.set(maquina.id, atual);
      numTarefa.set(tarefa.id, atual);
    }
  });
  const riscoCounterPorTarefa = new Map();
  linhasRaw.forEach(({tarefa,risco})=>{
    if(!numRisco.has(risco.id)){
      const atual = (riscoCounterPorTarefa.get(tarefa.id)||0)+1;
      riscoCounterPorTarefa.set(tarefa.id, atual);
      numRisco.set(risco.id, atual);
    }
  });
  return linhasRaw.map(item=>{
    const nM = numMaquina.get(item.maquina.id), nT = numTarefa.get(item.tarefa.id), nR = numRisco.get(item.risco.id);
    return {...item, numMaquina:nM, numTarefa:nT, numRisco:nR, codigo:`${nM}.${nT}.${nR}`};
  });
}

// ---------- escape XML específico do Word + helpers de EMU ----------
function escapeXmlDocx(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}
const EMU_POR_PX_DOCX = 9525;
function emuFromPx(px){ return Math.round(px*EMU_POR_PX_DOCX); }

// Cores da marca MecSete usadas no relatório
const DOCX_COR_NAVY = "1E2148";
const DOCX_COR_ORANGE = "E94E1B";
const DOCX_COR_CINZA_TXT = "4A4A4A";
const DOCX_COR_CINZA_CLARO = "EDEDED";

function docxRuns(texto, opts={}){
  const linhas = String(texto==null?"":texto).split(/\r\n|\r|\n/);
  const rPr = [];
  if(opts.bold) rPr.push("<w:b/>");
  if(opts.color) rPr.push(`<w:color w:val="${opts.color}"/>`);
  if(opts.size) rPr.push(`<w:sz w:val="${opts.size}"/>`);
  if(opts.italic) rPr.push("<w:i/>");
  const rPrXml = rPr.length? `<w:rPr>${rPr.join("")}</w:rPr>` : "";
  return linhas.map((l,i)=>{
    const t = `<w:r>${rPrXml}<w:t xml:space="preserve">${escapeXmlDocx(l)}</w:t></w:r>`;
    return i < linhas.length-1 ? t + `<w:r>${rPrXml}<w:br/></w:r>` : t;
  }).join("");
}
function docxParagraph(innerRuns, pOpts={}){
  const pPr = [];
  if(pOpts.keepNext) pPr.push(`<w:keepNext/>`);
  if(pOpts.borderBottom) pPr.push(`<w:pBdr><w:bottom w:val="single" w:sz="${pOpts.borderBottom.sz||6}" w:space="1" w:color="${pOpts.borderBottom.color}"/></w:pBdr>`);
  if(pOpts.shading) pPr.push(`<w:shd w:val="clear" w:fill="${pOpts.shading}"/>`);
  if(pOpts.spacingBefore!=null || pOpts.spacingAfter!=null){
    pPr.push(`<w:spacing${pOpts.spacingBefore!=null?` w:before="${pOpts.spacingBefore}"`:""}${pOpts.spacingAfter!=null?` w:after="${pOpts.spacingAfter}"`:""}/>`);
  }
  if(pOpts.jc) pPr.push(`<w:jc w:val="${pOpts.jc}"/>`);
  const pPrXml = pPr.length? `<w:pPr>${pPr.join("")}</w:pPr>` : "";
  return `<w:p>${pPrXml}${innerRuns}</w:p>`;
}
function docxImagemInline(relId, dimsOriginal, larguraMaxPx, alturaMaxPx){
  let w = dimsOriginal.w, h = dimsOriginal.h;
  const escala = Math.min(larguraMaxPx/w, alturaMaxPx ? alturaMaxPx/h : Infinity, 1);
  const wFinal = Math.round(w*escala), hFinal = Math.round(h*escala);
  const cx = emuFromPx(wFinal), cy = emuFromPx(hFinal);
  const docPrId = Math.floor(Math.random()*100000);
  return `<w:r><w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0">
    <wp:extent cx="${cx}" cy="${cy}"/>
    <wp:docPr id="${docPrId}" name="Imagem ${docPrId}"/>
    <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
      <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
        <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
          <pic:nvPicPr><pic:cNvPr id="${docPrId}" name="Imagem ${docPrId}"/><pic:cNvPicPr/></pic:nvPicPr>
          <pic:blipFill><a:blip r:embed="${relId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>
          <pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>
            <a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>
        </pic:pic>
      </a:graphicData>
    </a:graphic>
  </wp:inline></w:drawing></w:r>`;
}

// Calcula o recorte central (crop) necessário para exibir a imagem como quadrado
// perfeito, sem distorcer: corta os lados (se paisagem) ou topo/base (se retrato).
function calcularSrcRect(w, h){
  if(w === h) return {l:0,t:0,r:0,b:0};
  if(w > h){
    const sobra = w - h;
    const corte = Math.round(sobra/2/w*100000);
    return {l:corte, t:0, r:corte, b:0};
  } else {
    const sobra = h - w;
    const corte = Math.round(sobra/2/h*100000);
    return {l:0, t:corte, r:0, b:corte};
  }
}
// Imagem quadrada de tamanho fixo (tamanhoPx x tamanhoPx), com recorte central
// automático para não distorcer a foto original.
function docxImagemQuadrada(relId, dimsOriginal, tamanhoPx){
  const {l,t,r,b} = calcularSrcRect(dimsOriginal.w, dimsOriginal.h);
  const cx = emuFromPx(tamanhoPx), cy = emuFromPx(tamanhoPx);
  const docPrId = Math.floor(Math.random()*100000);
  const srcRectXml = (l||t||r||b) ? `<a:srcRect l="${l}" t="${t}" r="${r}" b="${b}"/>` : "";
  return `<w:r><w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0">
    <wp:extent cx="${cx}" cy="${cy}"/>
    <wp:docPr id="${docPrId}" name="Imagem ${docPrId}"/>
    <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
      <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
        <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
          <pic:nvPicPr><pic:cNvPr id="${docPrId}" name="Imagem ${docPrId}"/><pic:cNvPicPr/></pic:nvPicPr>
          <pic:blipFill><a:blip r:embed="${relId}"/>${srcRectXml}<a:stretch><a:fillRect/></a:stretch></pic:blipFill>
          <pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm>
            <a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>
        </pic:pic>
      </a:graphicData>
    </a:graphic>
  </wp:inline></w:drawing></w:r>`;
}
// Monta uma grade de fotos 2 por linha (2x2, 2x3...), todas com tamanho padrão
// quadrado, com a legenda numerada (Figura X.X.X.N) sob cada uma.
function docxGradeFotos(fotosInfo, tamanhoPx){
  const tcPrBase = `<w:tcW w:w="4680" w:type="dxa"/><w:tcMar><w:top w:w="0" w:type="dxa"/><w:left w:w="0" w:type="dxa"/><w:bottom w:w="0" w:type="dxa"/><w:right w:w="0" w:type="dxa"/></w:tcMar><w:vAlign w:val="top"/>`;
  const cel = (info) => {
    if(!info) return `<w:tc><w:tcPr>${tcPrBase}</w:tcPr><w:p/></w:tc>`;
    const img = docxImagemQuadrada(info.relId, {w:info.w,h:info.h}, tamanhoPx);
    return `<w:tc><w:tcPr>${tcPrBase}</w:tcPr>
      ${docxParagraph(img,{jc:'center',spacingAfter:20})}
      ${docxParagraph(docxRuns(info.legenda,{italic:true,size:18,color:DOCX_COR_CINZA_TXT}),{jc:'center',spacingAfter:160})}
    </w:tc>`;
  };
  const linhas = [];
  for(let i=0;i<fotosInfo.length;i+=2){
    linhas.push(`<w:tr>${cel(fotosInfo[i])}${cel(fotosInfo[i+1]||null)}</w:tr>`);
  }
  return `<w:tbl>
    <w:tblPr><w:tblW w:w="9360" w:type="dxa"/><w:tblBorders>
      <w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="nil"/><w:right w:val="nil"/>
      <w:insideH w:val="nil"/><w:insideV w:val="nil"/></w:tblBorders><w:tblLayout w:type="fixed"/>
      <w:tblCellMar><w:top w:w="0" w:type="dxa"/><w:left w:w="0" w:type="dxa"/><w:bottom w:w="0" w:type="dxa"/><w:right w:w="0" w:type="dxa"/></w:tblCellMar></w:tblPr>
    <w:tblGrid><w:gridCol w:w="4680"/><w:gridCol w:w="4680"/></w:tblGrid>
    ${linhas.join("\n")}
  </w:tbl>`;
}

// ---------- monta o XML do corpo do relatório ----------
function buildDocxBody({linhasNumeradas, projeto, imgMap}){
  let relCounter = 1;
  imgMap.forEach((info)=>{ info.relId = `rId${relCounter}`; relCounter++; });

  const corpo = [];
  corpo.push(docxParagraph(docxRuns("RELATÓRIO DE AVALIAÇÃO DE RISCOS",{bold:true,size:56,color:DOCX_COR_NAVY}),{spacingAfter:80}));
  corpo.push(docxParagraph(docxRuns("NR-12 · ISO 12100 · ISO 13849-1",{bold:true,size:24,color:DOCX_COR_ORANGE}),{spacingAfter:400}));
  corpo.push(docxParagraph(docxRuns(`Empresa: ${projeto.empresa||"—"}`,{size:22}),{spacingAfter:40}));
  corpo.push(docxParagraph(docxRuns(`Cidade: ${projeto.cidade||"—"}`,{size:22}),{spacingAfter:40}));
  corpo.push(docxParagraph(docxRuns(`Responsável técnico: ${projeto.responsavel||"—"}`,{size:22}),{spacingAfter:40}));
  const dataInspecaoDocx = projeto.criadoEm ? new Date(projeto.criadoEm).toLocaleDateString("pt-BR") : (projeto.data||"—");

function buildDocxPackageZip({documentXml, relsImagem, imgMap}){
  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Default Extension="jpeg" ContentType="image/jpeg"/>
  <Default Extension="png" ContentType="image/png"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
  const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
  const documentRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  ${relsImagem.join("\n  ")}
</Relationships>`;
  const files = [
    {name:"[Content_Types].xml", data: strToBytes(contentTypes)},
    {name:"_rels/.rels", data: strToBytes(rootRels)},
    {name:"word/document.xml", data: strToBytes(documentXml)},
    {name:"word/_rels/document.xml.rels", data: strToBytes(documentRels)},
  ];
  imgMap.forEach(info=> files.push({name:`word/media/${info.mediaName}`, data: info.bytes}));
  return buildZip(files);
}

/* =========================================================================
   MOTOR DE LAUDO WORD — baseado em docxtemplater (PizZip + docxtemplater +
   módulo de imagem). O app não desenha mais o Word por dentro: ele abre o
   modelo oficial da MecSete (que já contém as marcações {{campo}} e os
   blocos de repetição {{#maquinas}}...{{/maquinas}}), preenche os dados
   reais da inspeção e devolve o arquivo pronto. O modelo pode ser editado
   diretamente no Word por qualquer pessoa, sem programação.
   ========================================================================= */

// Foto "vazia" (1x1 transparente) usada quando um risco não tem foto,
// para a tag {{%foto}} sempre ter algo válido para inserir.
const FOTO_VAZIA_B64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==";

function montarDadosMaquinaDocx(area, maquina, fotosPreparadas){
  const tarefas = maquina.tarefas.map((tarefa)=>{
    const tarefaTxt = valOuOutro(tarefa.tarefa, tarefa.tarefaOutro) || "Tarefa sem nome";
    const riscos = tarefa.riscos.map((risco)=>{
      const {po,fe,gpd,np,hrn,nivel} = hrnDoItem({tarefa,risco});
      const nomeRisco = corrigirNomeRisco(risco.nome===OUTRO?risco.nomeOutro:risco.nome) || "Risco sem nome";
      let descricaoCompleta = corrigirTextoMecanico(risco.descricao)||"";
      if(risco.medidaImplementada==="sim" && risco.descMedida){
        descricaoCompleta += (descricaoCompleta?" ":"") + "Medida de controle já implementada: " + corrigirTextoMecanico(risco.descMedida);
      } else if(risco.medidaImplementada==="nao"){
        descricaoCompleta += (descricaoCompleta?" ":"") + "Não há medida de controle implementada até o momento.";
      }
      const mitigacao = corrigirTextoMecanico(risco.sugestaoMitigacao) || "Não informado.";
      return {
        numero: "",
        descricao: (nomeRisco?nomeRisco+". ":"") + descricaoCompleta,
        po: labelHRN(HRN_PO_OPTS,po,HRN_PO_TABELA),
        fe: labelHRN(HRN_FE_OPTS,fe,HRN_FE_TABELA),
        gpd: labelHRN(HRN_GPD_OPTS,gpd,HRN_GPD_TABELA),
        np: labelHRN(HRN_NP_OPTS,np,HRN_NP_TABELA),
        hrn: `${hrn} — ${nivel}`,
        mitigacao,
        foto: risco.foto || null,
        _origId: {tarefaId: tarefa.id, riscoId: risco.id},
      };
    });
    return {
      tituloTarefa: `TAREFA: ${(tarefaTxt||"").toUpperCase()}`,
      descricaoTarefa: corrigirTextoMecanico(tarefa.descricao) || "—",
      tituloRiscos: `RISCOS — ${(nomeMaquinaS(maquina)||"").toUpperCase()} — ${(tarefaTxt||"").toUpperCase()}`,
      riscos,
    };
  });
  return {
    nome: nomeMaquinaS(maquina) || "Máquina sem nome",
    marca: "", modelo: "", fabricacao: "",
    serie: "", localizacao: area.nome||area.local||"", capacidade: "",
    posicaoLayout: area.nome||area.local||"",
    escopo: corrigirTextoMecanico(maquina.escopo || maquina.descricao) || "—",
    fotoMaquina: maquina.fotoGeral || null,
    tarefas,
  };
}

async function gerarBytesDocxSimples(linhasRaw){
  const proj = linhasRaw[0].proj;
  const area = linhasRaw[0].area;
  const linhasNumeradas = numerarHierarquiaSimples(linhasRaw);

  const maquinasOrdenadas = [];
  const idxPorMaquina = new Map();
  linhasNumeradas.forEach(item=>{
    if(!idxPorMaquina.has(item.maquina.id)){
      idxPorMaquina.set(item.maquina.id, maquinasOrdenadas.length);
      maquinasOrdenadas.push({ maquina:item.maquina, itens:[] });
    }
    maquinasOrdenadas[idxPorMaquina.get(item.maquina.id)].itens.push(item);
  });

  // Prepara (comprime + mede) todas as fotos usadas, do mesmo jeito que o Excel já faz.
  const fotosPreparadas = new Map();
  async function prepararFoto(dataUrl){
    if(!dataUrl || fotosPreparadas.has(dataUrl)) return;
    const dataUrlExport = await recomprimirParaExport(dataUrl);
    const dims = await getImageDims(dataUrlExport);
    fotosPreparadas.set(dataUrl, { bytes: dataUrlToBytes(dataUrlExport), w: dims.w, h: dims.h });
  }
  for(const item of linhasNumeradas){ await prepararFoto(item.risco.foto); }
  for(const grupoMaquina of maquinasOrdenadas){ await prepararFoto(grupoMaquina.maquina.fotoGeral); }

  // Monta os dados de cada máquina e numera os riscos na ordem já calculada pelo app.
  const maquinasDados = maquinasOrdenadas.map(grupoMaquina=>{
    const dadosMaquina = montarDadosMaquinaDocx(area, grupoMaquina.maquina, fotosPreparadas);
    dadosMaquina.tarefas.forEach(tInfo=>{
      tInfo.riscos.forEach(rInfo=>{
        const itemNumerado = grupoMaquina.itens.find(x=> x.tarefa.id===rInfo._origId.tarefaId && x.risco.id===rInfo._origId.riscoId);
        rInfo.numero = itemNumerado ? String(itemNumerado.codigo) : "";
        delete rInfo._origId;
      });
    });
    return dadosMaquina;
  });

  const dados = {
    tituloLaudo: `LAUDO DE ADEQUAÇÃO NR-12 — ${(area.nome||"ÁREA").toUpperCase()}`,
    cliente: proj.empresa || "—",
    numDocumento: proj.numDocumento || "—",
    art: proj.numeroART || "—",
    responsavel: proj.responsavel || "Luiz Hermelino Araujo",
    dataEmissao: new Date().toLocaleDateString("pt-BR"),
    cnpj: proj.cnpjCliente || "—",
    endereco: proj.enderecoCliente || "—",
    cidade: proj.cidade || "—",
    telefone: proj.telefoneCliente || "—",
    email: proj.emailCliente || "—",
    cargoResponsavel: proj.cargoResponsavel || "—",
    maquinas: maquinasDados,
  };

  const modeloCustomB64 = await lerModeloWordCustom();
  const zip = new window.PizZip(modeloCustomB64 || MODELO_LAUDO_DOCX_B64, { base64: true });

  const imageOpts = {
    centered: false,
    getImage(tagValue){
      if(tagValue && fotosPreparadas.has(tagValue)) return fotosPreparadas.get(tagValue).bytes;
      return b64ParaBytes(FOTO_VAZIA_B64);
    },
    getSize(img, tagValue, tagName){
      // Foto geral da máquina entra numa célula reservada e mesclada da tabela
      // de identificação (≈300px de largura × ≈90px de altura mesclada).
      // Precisa respeitar esse limite para não deformar a linha da tabela.
      if(tagName === "fotoMaquina"){
        if(tagValue && fotosPreparadas.has(tagValue)){
          const info = fotosPreparadas.get(tagValue);
          const larguraMax = 280, alturaMax = 90;
          let largura = larguraMax;
          let altura = Math.round(largura * (info.h/info.w || 0.75));
          if(altura > alturaMax){ altura = alturaMax; largura = Math.round(altura * (info.w/info.h || 1.33)); }
          return [largura, altura];
        }
        return [1,1];
      }
      // Foto de evidência do risco (bloco solto no corpo do relatório)
      if(tagValue && fotosPreparadas.has(tagValue)){
        const info = fotosPreparadas.get(tagValue);
        const largura = 200;
        const altura = Math.round(largura * (info.h/info.w || 0.75));
        return [largura, altura];
      }
      return [1,1];
    },
  };

  const doc = new window.docxtemplater(zip, {
    paragraphLoop: true,
    linebreaks: true,
    delimiters: { start: "{{", end: "}}" },
    modules: [new window.ImageModule(imageOpts)],
  });

  doc.render(dados);
  const blob = doc.getZip().generate({ type: "uint8array", compression: "DEFLATE" });
  return blob;
}

function b64ParaBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function exportarSimplesDOCX(){
  confirmarGeracaoComCamposFaltando(_exportarSimplesDOCXReal);
}
async function _exportarSimplesDOCXReal(){
  const idsSelecionados = getAreasSelecionadasExport();
  if(idsSelecionados.length===0){ toast("Selecione ao menos uma área em Configurações", false); return; }
  let linhasRaw = linhasEscopoSimples().filter(item=>idsSelecionados.includes(item.area.id));
  if(linhasRaw.length===0){ toast("Nada para exportar ainda", false); return; }
  toast("Gerando Word por área… aguarde");
  if(getIAApiKey()){
    linhasRaw = await enriquecerLinhasComIA(linhasRaw, (i,total)=> toast(`Melhorando textos com IA… ${i}/${total}`));
  }
  try {
    const grupos = agruparLinhasPorArea(linhasRaw);
    const arquivos = [];
    for(let i=0;i<grupos.length;i++){
      const g = grupos[i];
      toast(`Gerando Word… área ${i+1}/${grupos.length}: ${g.area.nome||"—"}`);
      const bytes = await gerarBytesDocxSimples(g.linhas);
      arquivos.push({ name: nomeArquivoArea(g.proj, g.area, "docx"), data: bytes });
    }
    if(arquivos.length===1){
      const blob = new Blob([arquivos[0].data], {type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
      await compartilharOuBaixarBlob(blob, arquivos[0].name, blob.type, "Word exportado");
    } else {
      const zipBytes = buildZip(arquivos);
      const blob = new Blob([zipBytes], {type:"application/zip"});
      await compartilharOuBaixarBlob(blob, `relatorios_word_${hoje()}.zip`, blob.type, `${arquivos.length} arquivos Word exportados em .zip`);
    }
  } catch(erroExport) {
    console.error("Erro ao gerar Word por área (Módulo Simplificado):", erroExport);
    toast("Erro ao gerar o Word: "+(erroExport && erroExport.message ? erroExport.message : String(erroExport)), false);
  }
}

/* =========================================================================
   API PÚBLICA (App.*)
   ========================================================================= */
const App = {
  go,
  cardClickGenerico,
  fecharModal(){ const el=document.getElementById("overlayRoot"); if(el) el.remove(); },
  async compartilharArquivoPronto(){
    const pend = __arquivoProntoParaCompartilhar; if(!pend) return;
    try{
      const file = new File([pend.blob], pend.filename, {type:pend.blob.type});
      await navigator.share({files:[file], title:pend.filename});
      App.fecharModal();
      if(pend.mensagemSucesso) toast(pend.mensagemSucesso);
    }catch(e){
      // Usuário cancelou o menu de compartilhamento (AbortError) — respeita a decisão,
      // mantém o modal aberto para que possa tentar de novo ou escolher "Salvar no aparelho".
      if(e && e.name === "AbortError") { return; }
      // Falha inesperada (não cancelamento) — usa o download tradicional como alternativa segura.
      toast("Não foi possível abrir o compartilhamento — baixando o arquivo", false);
      App.fecharModal();
      downloadBlobDireto(pend.blob, pend.filename);
    }
    __arquivoProntoParaCompartilhar = null;
  },
  baixarArquivoPronto(){
    const pend = __arquivoProntoParaCompartilhar; if(!pend) return;
    App.fecharModal();
    downloadBlobDireto(pend.blob, pend.filename);
    if(pend.mensagemSucesso) toast(pend.mensagemSucesso);
    __arquivoProntoParaCompartilhar = null;
  },
  fecharArquivoPronto(){ __arquivoProntoParaCompartilhar = null; App.fecharModal(); },

  /* ---------- Seleção de módulo ---------- */
  selecionarModulo(m){
    STATE.modulo = m; marcarAlterado();
    if(m==="completo") go("projetos"); else go("simples-projetos");
  },
  trocarModulo(){ STATE.modulo = null; marcarAlterado(); render(); },
  onBuscaChange(value){ __buscaAtual = value; render(); },
  toggleContraste(){ STATE.contrasteAlto = !STATE.contrasteAlto; marcarAlterado(); render(); toast(STATE.contrasteAlto? "Alto contraste ativado" : "Alto contraste desativado"); },
  onMecseteConfigInput(campo, v){ getMecseteConfig()[campo] = v; marcarAlterado(); },

  async onUploadModeloWord(file){
    if(!file) return;
    if(!/\.docx$/i.test(file.name)){ toast("Selecione um arquivo .docx", false); return; }
    try{
      const buf = await file.arrayBuffer();
      let binStr = ""; const bytes = new Uint8Array(buf);
      for(let i=0;i<bytes.length;i++) binStr += String.fromCharCode(bytes[i]);
      const base64 = btoa(binStr);
      // valida rapidamente que o arquivo é um .docx de verdade (zip com word/document.xml)
      // antes de gravar, pra não travar as próximas exportações com um arquivo inválido.
      const zipTeste = new window.PizZip(base64, { base64: true });
      if(!zipTeste.file("word/document.xml")){
        toast("Esse arquivo não parece ser um .docx válido", false); return;
      }
      await salvarModeloWordCustom(base64);
      __modeloCustomCarregado = true;
      render();
      toast("Modelo enviado! Os próximos laudos em Word já usam esse arquivo.");
    }catch(e){
      toast("Não foi possível ler o arquivo: " + (e && e.message || "erro desconhecido"), false);
    }
  },
  async onRestaurarModeloPadrao(){
    await apagarModeloWordCustom();
    __modeloCustomCarregado = false;
    render();
    toast("Modelo padrão da MecSete restaurado");
  },

    else if(tipo==="areaS"){ const proj=STATE.projetosSimples.find(p=>p.id===parent.projetoSId); substituirOuAdicionar(proj.areas, ent); }
    else if(tipo==="maquinaS"){ const area=buscarAreaSimplesPorId(parent.areaSId); substituirOuAdicionar(area.maquinas, ent); }

  executarDuplicarSelecionadosParaDestino(destinoId){

    else if(sm.tipo==="tarefaS") destinoArr = buscarMaquinaSimplesPorId(destinoId).tarefas;
    else if(sm.tipo==="riscoS") destinoArr = buscarTarefaSimplesPorId(destinoId).riscos;
    else return;
    const selecionados = origemArr.filter(x=>sm.ids.has(x.id));
    selecionados.forEach(item=>{

      novo.id = uid(); novo.criadoEm = Date.now();
      if(sm.tipo==="maquinaS") novo.tarefas.forEach(t=>{ t.id=uid(); t.riscos.forEach(r=>r.id=uid()); });

    App.fecharModal();
    const n = selecionados.length, tipo = sm.tipo;
    __selMode = null;
    if(tipo==="maquinaS") go("simples-maquinas",{areaSId:destinoId});

      if(comFilhos){
        if(sm.tipo==="areaS") novo.maquinas.forEach(m=>{ m.id=uid(); m.tarefas.forEach(t=>{ t.id=uid(); t.riscos.forEach(r=>r.id=uid()); }); });
        if(sm.tipo==="maquinaS") novo.tarefas.forEach(t=>{ t.id=uid(); t.riscos.forEach(r=>r.id=uid()); });
        if(sm.tipo==="tarefaS") novo.riscos.forEach(r=>r.id=uid());

        if(sm.tipo==="areaS") novo.maquinas=[];
        if(sm.tipo==="maquinaS") novo.tarefas=[];
        if(sm.tipo==="tarefaS") novo.riscos=[];

      arr.push(novo);
    });
    marcarAlterado();
    App.fecharModal();
    const n = selecionados.length;
    __selMode = null;
    render();
    toast(`${n} item(ns) duplicado(s)`);

      abrirCascata(["area","maquina","tarefa"], {areaId:areaOrigemId, maquinaId:maquinaOrigemId, tarefaId:sm.ctx.tarefaSId}, `Mover ${n} risco(s)`, "Mover", (escolha)=>{

  executarMoverSelecionados(destinoId){
    const sm = __selMode; if(!sm) return;
    let origemArr, destinoArr, origemScreen, origemParams, origemLabel;
    if(sm.tipo==="maquinaS"){
      if(destinoId===sm.ctx.areaSId){ toast("Já estão nessa área", false); return; }
      const proj = getCurrentProjetoSimples();
      const areaOrigem = proj.areas.find(a=>a.id===sm.ctx.areaSId);
      origemArr = areaOrigem.maquinas;
      destinoArr = proj.areas.find(a=>a.id===destinoId).maquinas;
      origemScreen = "simples-maquinas"; origemParams = {areaSId:areaOrigem.id}; origemLabel = areaOrigem.nome||"área anterior";
    } else if(sm.tipo==="tarefaS"){
      if(destinoId===sm.ctx.maquinaSId){ toast("Já estão nessa máquina", false); return; }
      const maquinaOrigem = buscarMaquinaSimplesPorId(sm.ctx.maquinaSId);
      origemArr = maquinaOrigem.tarefas;
      destinoArr = buscarMaquinaSimplesPorId(destinoId).tarefas;
      origemScreen = "simples-tarefas"; origemParams = {maquinaSId:maquinaOrigem.id}; origemLabel = nomeMaquinaS(maquinaOrigem)||"máquina anterior";
    } else if(sm.tipo==="riscoS"){
      if(destinoId===sm.ctx.tarefaSId){ toast("Já estão nessa tarefa", false); return; }
      const tarefaOrigem = buscarTarefaSimplesPorId(sm.ctx.tarefaSId);
      origemArr = tarefaOrigem.riscos;
      destinoArr = buscarTarefaSimplesPorId(destinoId).riscos;
      origemScreen = "simples-riscos"; origemParams = {tarefaSId:tarefaOrigem.id}; origemLabel = valOuOutro(tarefaOrigem.tarefa,tarefaOrigem.tarefaOutro)||"tarefa anterior";
    } else { return; }
    const movidos = origemArr.filter(x=>sm.ids.has(x.id));
    const restantes = origemArr.filter(x=>!sm.ids.has(x.id));
    origemArr.length = 0; origemArr.push(...restantes);
    destinoArr.push(...movidos);
    marcarAlterado();
    const n = movidos.length, tipo = sm.tipo;
    const idsMovidos = movidos.map(x=>x.id);
    __selMode = null;
    registrarMovimento(tipo, idsMovidos, origemScreen, origemParams, origemLabel);
    if(tipo==="maquinaS") go("simples-maquinas",{areaSId:destinoId});
    else if(tipo==="tarefaS") go("simples-tarefas",{maquinaSId:destinoId});
    else if(tipo==="riscoS") go("simples-riscos",{tarefaSId:destinoId});
    toast(`${n} item(ns) movido(s)`);
  },

/* =========================================================================
   IMPORTAÇÃO DE BACKUP — PRÉVIA COM RELATÓRIO (Módulo Simplificado)
   Cada Projeto/Área/Máquina/Tarefa/Risco já nasce com um "id" único (uid())
   que não muda durante a vida do item, mesmo depois de editado — só o
   atualizadoEm muda. Isso permite casar, item a item, o que já existe no
   aparelho com o que está no arquivo importado:
     - id não existe no aparelho          -> adiciona (item novo)
     - id existe e está 100% igual         -> ignora (evita duplicar)
     - id existe e está diferente          -> fica a versão com atualizadoEm
                                              mais recente (a mais completa/
                                              atual); a mais antiga é descartada
   Diferente da versão anterior, essas funções rodam sobre uma CÓPIA dos dados
   (nunca o STATE de verdade) e, ao mesmo tempo, constroem uma árvore detalhada
   do que aconteceria com cada item — para o usuário revisar num modal antes
   de confirmar. Só depois da confirmação a cópia (já mesclada) substitui o
   STATE.projetosSimples de verdade.
   Válido só para o Módulo Simplificado. O Módulo Completo (congelado) mantém
   o comportamento antigo (soma direta), sem nenhuma linha de sua lógica alterada.
   ========================================================================= */
function __metaTsSimples(x){ return x.atualizadoEm || x.criadoEm || 0; }
function __semMetaSimples(obj, campoFilhos){
  const c = {...obj};
  delete c.atualizadoEm;
  if(campoFilhos) delete c[campoFilhos];
  return c;
}
function __noRelatorioImportacao(tipo, nome, status, contexto, filhos){
  return { tipo, nome: (nome && String(nome).trim()) ? String(nome).trim() : "(sem nome)", status, contexto: contexto||"", filhos: filhos||[] };
}
function previewRiscosSimples(atualArr, novosArr, st, ctx){
  const rel = [];
  novosArr.forEach(nv=>{
    const i = atualArr.findIndex(x=>x.id===nv.id);
    if(i<0){
      atualArr.push(nv); st.add++;
      rel.push(__noRelatorioImportacao("risco", nv.nome, "novo", ctx));
      return;
    }
    const ex = atualArr[i];
    if(JSON.stringify(__semMetaSimples(ex))===JSON.stringify(__semMetaSimples(nv))){
      st.igual++; rel.push(__noRelatorioImportacao("risco", ex.nome, "igual", ctx));
    } else if(__metaTsSimples(nv) > __metaTsSimples(ex)){
      atualArr[i]=nv; st.upd++; rel.push(__noRelatorioImportacao("risco", nv.nome, "atualizado", ctx));
    } else {
      st.mant++; rel.push(__noRelatorioImportacao("risco", ex.nome, "mais-recente-local", ctx));
    }
  });
  return rel;
}
function previewTarefasSimples(atualArr, novosArr, st, ctxPai){
  const rel = [];
  novosArr.forEach(nv=>{
    const nomeNv = nv.tarefa===OUTRO ? nv.tarefaOutro : nv.tarefa;
    const i = atualArr.findIndex(x=>x.id===nv.id);
    if(i<0){
      const novaLocal = {...nv, riscos:[]};

    const nomeExAtual = ex.tarefa===OUTRO ? ex.tarefaOutro : ex.tarefa;
    if(JSON.stringify(__semMetaSimples(ex,"riscos"))===JSON.stringify(__semMetaSimples(nv,"riscos"))){
      st.igual++; rel.push(__noRelatorioImportacao("tarefa", nomeExAtual, "igual", ctxPai, filhos));
    } else if(__metaTsSimples(nv) > __metaTsSimples(ex)){
      atualArr[i]={...nv, riscos:ex.riscos}; st.upd++; rel.push(__noRelatorioImportacao("tarefa", nomeNv, "atualizado", ctxPai, filhos));

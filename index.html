<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E2148">
<title>APR Campo · MecSete Engenharia</title>
<style>
:root{
  --bg:#F4F5F8;
  --bg-soft:#E8EAF0;
  --surface:#FFFFFF;
  --surface-2:#FBFBFD;
  --ink:#1E2148;
  --ink-dim:#4A4D6B;
  --ink-faint:#8A8CA3;
  --line:#DDE0E8;
  --line-strong:#C5C9D6;
  --accent:#E94E1B;
  --accent-ink:#C23F12;
  --accent-soft:#FCE0D4;
  --bar:#1E2148;
  --bar-2:#2A2E66;
  --on-bar:#FFFFFF;
  --on-bar-dim:#AEB1CE;
  --r-negligivel:#92D050;
  --r-baixo:#FFFF00;
  --r-medio:#FFC000;
  --r-alto:#FF0000;
  --r-muitoalto:#00B0F0;
  --danger:#D32F2F;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 10px 28px rgba(30,33,72,.12);
  --shadow-sm:0 2px 8px rgba(30,33,72,.08);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);
  overscroll-behavior-y:none; /* impede o "puxar para baixo recarrega a página" do navegador,
                                  que fechava a tela atual quando o app é usado offline */
}
body{font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
button{cursor:pointer;}
h1,h2,h3,h4,p,ul{margin:0;}
a{color:var(--accent-ink);}
::selection{background:var(--accent-soft);}
#app{min-height:100vh;display:flex;flex-direction:column;overscroll-behavior-y:none;}
.hazard-stripe{height:5px;width:100%;background:repeating-linear-gradient(135deg,#14163A 0 10px,var(--accent) 10px 20px);flex-shrink:0;}
.topbar{background:var(--bar);color:var(--on-bar);padding:12px 12px 10px;position:sticky;top:0;z-index:20;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;gap:8px;}
.topbar-back{background:none;border:none;color:var(--on-bar);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-back:active{background:rgba(255,255,255,.12);}
.topbar-title{flex:1;min-width:0;}
.topbar-title .eyebrow{font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--accent);font-weight:700;display:block;margin-bottom:1px;}
.topbar-title h1{font-size:18px;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-title .sub{font-size:12px;color:var(--on-bar-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.topbar-action{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:var(--on-bar);border-radius:10px;padding:7px 10px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.topbar-action:active{background:rgba(255,255,255,.2);}
.savechip{font-size:10.5px;color:var(--on-bar-dim);display:flex;align-items:center;gap:4px;letter-spacing:.02em;}
.savechip .dot{width:6px;height:6px;border-radius:50%;background:#7FE08A;flex-shrink:0;}
.savechip.saving .dot{background:var(--accent);}
.syncbadge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:var(--on-bar-dim);border-radius:20px;padding:5px 9px;font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.syncbadge svg{width:13px;height:13px;flex-shrink:0;}
.syncbadge.alerta{background:rgba(255,80,60,.22);border-color:rgba(255,120,90,.4);color:#FFDCD2;}
.syncbadge.sincronizando svg{animation:syncPulse 1s ease-in-out infinite;}
@keyframes syncPulse{0%,100%{opacity:.45;}50%{opacity:1;}}
.pasta-nome{display:flex;align-items:center;gap:6px;}
.pasta-nome svg{width:17px;height:17px;flex-shrink:0;}
.crumbbar{display:flex;gap:4px;overflow-x:auto;padding:9px 12px;background:var(--bar-2);scrollbar-width:none;align-items:center;}
.crumbbar::-webkit-scrollbar{display:none;}
.crumb{flex-shrink:0;display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--on-bar-dim);font-size:12px;font-weight:700;white-space:nowrap;padding:5px 6px;border-radius:7px;}
.crumb.current{color:#fff;background:rgba(255,255,255,.10);}
.crumb svg{width:14px;height:14px;}
.crumb-sep{color:var(--on-bar-dim);opacity:.5;flex-shrink:0;font-size:12px;}
.bottomnav{position:sticky;bottom:0;z-index:20;background:var(--bar);display:flex;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.bottomnav-item{flex:1;background:none;border:none;color:var(--on-bar-dim);display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;font-size:10.5px;font-weight:700;letter-spacing:.02em;}
.bottomnav-item svg{width:21px;height:21px;}
.bottomnav-item.active{color:var(--accent);}
.bottomnav-center{flex:1;display:flex;align-items:flex-end;justify-content:center;}
.bottomnav-fab{width:46px;height:46px;border-radius:50%;background:var(--accent);border:3px solid var(--bar);color:#fff;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0;}
.bottomnav-fab:active{background:var(--accent-ink);}
.bottomnav-fab svg{width:20px;height:20px;}
.screen{flex:1;padding:14px 12px 28px;max-width:760px;margin:0 auto;width:100%;}
.screen-narrow{max-width:620px;}
.section-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:22px 2px 10px;display:flex;align-items:center;justify-content:space-between;}
.section-title:first-child{margin-top:4px;}
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px;}
.dash-pill{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;box-shadow:var(--shadow-sm);}
.dash-pill b{display:block;font-size:19px;font-weight:800;line-height:1.1;}
.dash-pill span{font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
.dash-pill.warn b{color:var(--r-alto);}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden;}
.card-pad{padding:14px;}
.list-card{display:flex;gap:0;align-items:stretch;position:relative;}
.list-thumb{width:56px;flex-shrink:0;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);position:relative;}
.list-thumb img{width:100%;height:100%;object-fit:cover;}
.list-thumb svg{width:24px;height:24px;}
.list-body{flex:1;padding:11px 30px 11px 11px;min-width:0;}
.list-name{font-size:15.5px;font-weight:800;letter-spacing:-.01em;margin-bottom:1px;}
.list-tag{font-size:11.5px;color:var(--ink-faint);font-family:var(--mono);}
.list-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.stat-pill{font-size:11px;font-weight:700;background:var(--bg-soft);color:var(--ink-dim);border-radius:999px;padding:3px 8px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.stat-pill svg{width:12px;height:12px;flex-shrink:0;}
.stat-pill.icon-only{padding:5px;}
.stat-pill .risk-icn{display:flex;align-items:center;justify-content:center;}
.stat-pill .risk-icn svg{width:13px;height:13px;}
.stat-pill.alert{background:#FBE3DC;color:#C23F12;}
.list-actions{display:flex;align-items:center;gap:4px;padding:10px 10px 0 0;flex-shrink:0;}
.icon-btn{background:none;border:none;color:var(--ink-faint);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:active{background:var(--bg-soft);}
.icon-btn svg{width:18px;height:18px;}
.card-menu-btn{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--ink-faint);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;}
.card-menu-btn:active{background:var(--bg-soft);}
.card-menu-btn svg{width:18px;height:18px;}
.btn{border-radius:11px;padding:11px 16px;font-weight:700;font-size:14px;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:7px;line-height:1.1;}
.btn svg{width:17px;height:17px;flex-shrink:0;}
.btn-block{display:flex;width:100%;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{background:var(--accent-ink);}
.btn-secondary{background:var(--surface);color:var(--ink);border-color:var(--line-strong);}
.btn-secondary:active{background:var(--bg-soft);}
.btn-ghost{background:transparent;color:var(--ink-dim);}
.btn-ghost:active{background:var(--bg-soft);}
.btn-danger{background:#FCE7E5;color:var(--danger);}
.btn-danger:active{background:#F8D2CE;}
.btn-dark{background:var(--bar);color:var(--on-bar);}
.btn-dark:active{background:var(--bar-2);}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px;}
.btn[disabled]{opacity:.45;pointer-events:none;}
.fab-wrap{position:sticky;bottom:14px;display:flex;justify-content:flex-end;pointer-events:none;height:0;}
.fab{pointer-events:auto;background:var(--accent);color:#fff;border:none;border-radius:999px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px rgba(233,78,27,.45);margin-right:2px;}
.fab svg{width:25px;height:25px;}
.aggr-card{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--bar),var(--bar-2));color:#fff;border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
.aggr-card .ico{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.aggr-card .ico svg{width:20px;height:20px;}
.aggr-card .txt{flex:1;min-width:0;}
.aggr-card .txt b{font-size:14px;display:block;}
.aggr-card .txt span{font-size:11.5px;color:var(--on-bar-dim);}
.aggr-card svg.arrow{width:18px;height:18px;color:var(--on-bar-dim);flex-shrink:0;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-dim);margin-bottom:6px;}
.field .req{color:var(--r-alto);background:transparent;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea{width:100%;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 12px;font-size:14.5px;color:var(--ink);appearance:none;}
.field select{width:100%;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 12px;font-size:13px;color:var(--ink);appearance:none;}
.field select option,.field select optgroup{font-size:13px;}
.field select.sp-select-sm{font-size:11px;padding:9px 10px;}
.field select.sp-select-sm option,.field select.sp-select-sm optgroup{font-size:11px;}
.field select optgroup{font-weight:800;color:var(--ink-faint);font-style:normal;}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%234A4D6B'><path d='M5.5 7.5l4.5 4.5 4.5-4.5'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;}
.field textarea{min-height:74px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.field-hint{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}
.clear-text-btn{background:none;border:none;color:var(--ink-faint);font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;padding:2px 4px;}
.sugestoes-risco{margin-top:6px;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);overflow-y:auto;max-height:170px;background:var(--surface);}
.sugestao-chip{display:block;width:100%;text-align:left;background:var(--surface);border:none;border-bottom:1px solid var(--line);padding:8px 12px;font-size:11px;font-weight:600;color:var(--ink);}
.sugestao-chip:last-child{border-bottom:none;}
.sugestao-chip:active{background:var(--accent-soft);color:var(--accent-ink);}
.clear-text-btn svg{width:11px;height:11px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-opt{flex:1;min-width:84px;text-align:center;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:9px 6px;font-size:12.5px;font-weight:700;color:var(--ink-dim);background:var(--surface);}
.radio-opt input{display:none;}
.radio-opt.checked{background:var(--bar);color:#fff;border-color:var(--bar);}
details.section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);overflow:hidden;}
details.section summary{list-style:none;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:800;font-size:14px;}
details.section summary::-webkit-details-marker{display:none;}
details.section summary .num{width:24px;height:24px;border-radius:50%;background:var(--bg-soft);color:var(--ink-dim);font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
details.section summary .chev{margin-left:auto;color:var(--ink-faint);transition:transform .15s;flex-shrink:0;}
details.section summary .chev svg{width:18px;height:18px;}
details.section[open] summary .chev{transform:rotate(180deg);}
details.section .section-body{padding:2px 14px 16px;border-top:1px solid var(--line);}
.help-box-always{background:var(--bg-soft);border-radius:var(--radius-sm);padding:4px 12px;margin-top:8px;}
.help-item{padding:9px 0;border-bottom:1px solid var(--line);}
.help-item:last-child{border-bottom:none;}
.help-item b{font-size:12.5px;color:var(--accent-ink);display:block;margin-bottom:3px;}
.help-item ul{padding-left:16px;margin:0;}
.help-item li{font-size:12px;color:var(--ink-dim);line-height:1.4;}
.octagon{clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;border:2px solid rgba(0,0,0,.18);}
.octagon.lg{width:84px;height:84px;}
.octagon.lg .lvl{font-size:10px;letter-spacing:.03em;text-transform:uppercase;line-height:1.1;text-align:center;padding:0 4px;}
.octagon.lg .plr{font-size:15px;margin-top:1px;}
.octagon.md{width:46px;height:46px;}
.octagon.md .lvl{font-size:7px;letter-spacing:.02em;text-transform:uppercase;}
.octagon.md .plr{font-size:11px;}
.octagon.sm{width:30px;height:30px;}
.octagon.sm .lvl{display:none;}
.octagon.sm .plr{font-size:9.5px;}
.risk-row{display:flex;align-items:center;gap:14px;background:var(--bg-soft);border-radius:var(--radius-sm);padding:12px;margin-top:4px;}
.risk-row .info{flex:1;}
.risk-row .info .k{font-size:11px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.risk-row .info .v{font-size:15px;font-weight:800;}
.risk-row .info .cat{font-size:12px;color:var(--ink-dim);margin-top:2px;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-soft);border:1px solid var(--line);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .rm{position:absolute;top:4px;right:4px;background:rgba(30,33,72,.7);color:#fff;border:none;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.photo-thumb .rm svg{width:13px;height:13px;}
.photo-add{aspect-ratio:1;border-radius:var(--radius-sm);border:1.5px dashed var(--line-strong);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-faint);background:var(--surface);font-size:10.5px;font-weight:700;}
.photo-add svg{width:18px;height:18px;}
.photo-extra-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.photo-extra-head label{margin:0;}
.photo-extra-btns{display:flex;flex-direction:column;gap:4px;width:54px;flex-shrink:0;}
.photo-extra-btns .photo-add{aspect-ratio:auto;width:100%;}
.photo-extra-btns .photo-add.cam{height:48px;}
.photo-extra-btns .photo-add.gal{height:24px;}
.photo-extra-btns .photo-add.cam svg{width:20px;height:20px;}
.photo-extra-btns .photo-add.gal svg{width:14px;height:14px;}
.photo-extra-btns .photo-add span{font-size:9px;line-height:1;}
.outro-wrap{margin-top:8px;}
.empty{text-align:center;padding:46px 18px;color:var(--ink-faint);}
.empty svg{width:46px;height:46px;margin-bottom:12px;opacity:.6;}
.empty h3{font-size:15px;color:var(--ink-dim);margin-bottom:4px;font-weight:800;}
.empty p{font-size:13px;max-width:280px;margin:0 auto;}
.scope-toggle{display:flex;background:var(--bg-soft);border-radius:10px;padding:3px;margin-bottom:14px;}
.scope-toggle button{flex:1;background:none;border:none;padding:9px;border-radius:8px;font-weight:700;font-size:12.5px;color:var(--ink-dim);}
.scope-toggle button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);}
.export-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.export-row .btn{flex:1;min-width:120px;}
.obj-card{padding:13px 14px;}
.obj-card .obj-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px;}
.obj-card .obj-machine{font-size:11px;color:var(--accent-ink);font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
.obj-card .obj-task{font-size:14.5px;font-weight:800;margin-top:1px;}
.obj-grid{display:grid;grid-template-columns:1fr;gap:7px;font-size:12.8px;}
.obj-grid .row{display:flex;gap:8px;}
.obj-grid .row .lab{flex:0 0 122px;color:var(--ink-faint);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.02em;padding-top:1px;}
.obj-grid .row .val{flex:1;color:var(--ink);}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(10px);background:var(--bar);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;box-shadow:var(--shadow);opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;z-index:60;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast svg{width:16px;height:16px;color:#7FE08A;flex-shrink:0;}
.lightbox{position:fixed;inset:0;background:rgba(20,16,10,.92);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;}
.lightbox img{max-width:100%;max-height:85vh;border-radius:8px;}
.lightbox .lb-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.about-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--ink-dim);line-height:1.55;}
.about-box b{color:var(--ink);}
.about-box .std{display:inline-block;background:var(--bg-soft);border-radius:6px;padding:2px 7px;font-family:var(--mono);font-size:11px;margin:2px 3px 2px 0;}
.proj-banner{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;margin-bottom:14px;}
.proj-banner .ico{width:34px;height:34px;border-radius:9px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);flex-shrink:0;}
.proj-banner .ico svg{width:18px;height:18px;}
.proj-banner .info{flex:1;min-width:0;}
.proj-banner .info .lab{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:700;}
.proj-banner .info .val{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-banner .info .sub2{font-size:11.5px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sheet-overlay{position:fixed;inset:0;background:rgba(20,22,50,.5);z-index:70;display:flex;align-items:flex-end;justify-content:center;}
.sheet-overlay.center{align-items:center;padding:20px;}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:8px 16px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(0,0,0,.2);}
.sheet .sheet-handle{width:36px;height:4px;background:var(--line-strong);border-radius:99px;margin:8px auto 14px;}
.sheet h3{font-size:15px;font-weight:800;margin-bottom:2px;padding:0 4px;}
.sheet .sheet-sub{font-size:12px;color:var(--ink-faint);padding:0 4px;margin-bottom:14px;}
.sheet-item{width:100%;display:flex;align-items:center;gap:12px;padding:13px 8px;border-radius:10px;font-size:14.5px;font-weight:700;text-align:left;background:none;border:none;color:var(--ink);}
.sheet-item:active{background:var(--bg-soft);}
.sheet-item svg{width:19px;height:19px;color:var(--ink-faint);flex-shrink:0;}
.sheet-item.danger{color:var(--danger);}
.sheet-item.danger svg{color:var(--danger);}
.sheet-cancel{margin-top:6px;width:100%;text-align:center;padding:13px;border-radius:10px;font-weight:700;background:var(--bg-soft);border:none;color:var(--ink-dim);}
.modal-card{background:var(--surface);border-radius:var(--radius);width:100%;max-width:420px;padding:18px;max-height:85vh;overflow:auto;}
.modal-card h3{font-size:16px;font-weight:800;margin-bottom:4px;}
.modal-card .sheet-sub{margin-bottom:14px;font-size:12px;color:var(--ink-faint);}
.modal-actions{display:flex;gap:10px;margin-top:8px;}
.modal-actions .btn{flex:1;}
.mitig-box{background:#FCEAE5;border:1.5px solid #F0BBA9;border-radius:var(--radius-sm);padding:13px;margin-top:10px;}
.mitig-box .mitig-head{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;color:var(--accent-ink);margin-bottom:10px;}
.mitig-box .mitig-head svg{width:16px;height:16px;flex-shrink:0;}
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:none;background:none;padding:0;color:var(--ink-faint);cursor:pointer;flex-shrink:0;}
.info-btn svg{width:17px;height:17px;}
.info-btn:hover{color:var(--ink-dim);}
.info-box{background:var(--bg-soft);border:1px solid var(--border,#D5D8E3);border-radius:var(--radius-sm);padding:11px 13px;margin-top:8px;font-size:12.5px;}
.info-box .info-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.info-box .info-row:last-child{border-bottom:none;}
.info-box .info-row b{flex:0 0 132px;color:var(--ink-dim);}
.info-box .info-row span{flex:1;color:var(--ink-faint);}
.risk-strip{border-left:6px solid transparent;}

/* ---------- Módulo Simplificado ---------- */
.module-pick{background:var(--surface);border:none;padding:0;text-align:left;display:block;width:100%;cursor:pointer;}
.checklist-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px;margin-bottom:8px;cursor:pointer;}
.checklist-item img{width:42px;height:42px;border-radius:7px;object-fit:cover;flex-shrink:0;}
.checklist-icon{width:42px;height:42px;border-radius:7px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;color:var(--ink-faint);flex-shrink:0;}
.checklist-icon svg{width:18px;height:18px;}
.checklist-txt{flex:1;min-width:0;}
.checklist-txt b{display:block;font-size:13.5px;font-weight:700;}
.checklist-txt span{font-size:11.5px;color:var(--ink-faint);}

/* ---------- Seleção múltipla (toque longo) ---------- */
.list-card.selectable{user-select:none;-webkit-user-select:none;}

.list-card.recem-movido{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft) inset;background:var(--accent-soft);}
.voltar-origem-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:10px;font-size:12.5px;font-weight:600;}
.voltar-origem-bar svg{width:14px;height:14px;vertical-align:-2px;margin-right:2px;}
.voltar-origem-bar button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;flex-shrink:0;}
.sel-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-strong);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:14px 0 14px 12px;}
.sel-check svg{width:14px;height:14px;color:#fff;opacity:0;}
.list-card.selected{border-color:var(--accent);background:var(--accent-soft);}
.list-card.selected .sel-check{background:var(--accent);border-color:var(--accent);}
.list-card.selected .sel-check svg{opacity:1;}
.selbar{position:fixed;left:0;right:0;bottom:0;background:var(--bar);color:#fff;padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:8px;z-index:30;box-shadow:0 -8px 20px rgba(0,0,0,.18);}
.selbar .count{font-weight:800;font-size:13.5px;flex:1;white-space:nowrap;}
.selbar button{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:9px;padding:9px 10px;font-size:11.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.selbar button svg{width:17px;height:17px;}
.selbar button.danger{background:rgba(255,80,60,.22);}
.selbar .selbar-cancel{background:none;color:var(--on-bar-dim);flex:0;padding:9px 6px;}

/* ---------- Busca nas listas ---------- */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:11px;padding:10px 38px 10px 14px;font-size:14px;color:var(--ink);}
.search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.search-wrap .search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--bg-soft);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);}
.search-wrap .search-clear svg{width:13px;height:13px;}
.list-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.list-toolbar .search-wrap{flex:1;margin-bottom:0;}
.ordem-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:11px;padding:0 11px;height:42px;font-size:11px;font-weight:700;color:var(--ink-dim);white-space:nowrap;}
.ordem-btn svg{width:14px;height:14px;color:var(--ink-faint);flex-shrink:0;}
.drag-handle{width:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);touch-action:none;cursor:grab;}
.drag-handle svg{width:18px;height:18px;}
.list-card.dragging{box-shadow:0 10px 24px rgba(30,33,72,.25);opacity:.96;position:relative;z-index:40;}

/* ---------- Miniaturas maiores (Máquinas e Riscos) ---------- */
.list-thumb.lg{width:84px;}
.list-thumb.lg svg{width:32px;height:32px;}

/* ---------- Modo de alto contraste ---------- */
html[data-contraste="alto"]{
  --bg:#FFFFFF; --bg-soft:#E2E5EC; --surface:#FFFFFF; --surface-2:#FFFFFF;
  --ink:#000000; --ink-dim:#1A1A1A; --ink-faint:#3D3D3D;
  --line:#8A8D9C; --line-strong:#4A4D5C;
  --accent:#C23F12; --accent-ink:#8E2D0B; --accent-soft:#FFD9C2;
  --bar:#0E1030; --bar-2:#1A1D4A; --on-bar:#FFFFFF; --on-bar-dim:#D8DAE8;
}
html[data-contraste="alto"] .card,html[data-contraste="alto"] .list-card{border-width:2px;}
html[data-contraste="alto"] .stat-pill{font-weight:800;border:1px solid currentColor;}
html[data-contraste="alto"] .checklist-item,html[data-contraste="alto"] .field input,html[data-contraste="alto"] .field select,html[data-contraste="alto"] .field textarea{border-width:2px;}

/* ---------- Switch (toggle) ---------- */
.switch{position:relative;display:inline-block;width:50px;height:30px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch-track{position:absolute;cursor:pointer;inset:0;background:var(--line-strong);border-radius:999px;transition:background .15s;}
.switch-track::before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch input:checked + .switch-track{background:var(--accent);}
.switch input:checked + .switch-track::before{transform:translateX(20px);}


@media print{.topbar,.crumbbar,.bottomnav,.fab-wrap,.export-row,.scope-toggle,.toast{display:none!important;}body{background:#fff;}.screen{padding:0;max-width:none;}.card,.obj-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileGeneral" accept="image/*" capture="environment" hidden>
<input type="file" id="fileHazard" accept="image/*" capture="environment" multiple hidden>
<input type="file" id="fileGeneralGaleria" accept="image/*" hidden>
<input type="file" id="fileHazardGaleria" accept="image/*" multiple hidden>
<input type="file" id="fileImport" accept="application/json" hidden>
<div id="toast" class="toast"></div>

// labelHRN aceita tanto o valor numérico (dados antigos) quanto já receber o nome
// (dados novos), sempre devolvendo só o nome da classificação.
function labelHRN(lista, valor, tabela){
  if(tabela){
    const porNome = tabela.find(x=>x.classificacao===valor);
    if(porNome) return porNome.classificacao;
    const porValor = tabela.find(x=>x.valor===valor || String(x.valor)===String(valor));
    if(porValor) return porValor.classificacao;
  }
  if(lista.includes(valor)) return valor;
  return lista.find(l=>l===String(valor))||String(valor);
}

function nomesRiscosUsadosNoProjeto(){
  const proj = getCurrentProjetoSimples();
  if(!proj) return [];
  const vistos = new Map();
  proj.areas.forEach(a=> a.maquinas.forEach(m=> m.tarefas.forEach(t=> t.riscos.forEach(r=>{
    if(r.nome && r.nome.trim()) vistos.set(r.nome, r.descricao||"");
  }))));
  return [...vistos.entries()].map(([nome,desc])=>({nome,desc}));
}
function sugestoesNomeRisco(){
  const usados = nomesRiscosUsadosNoProjeto();
  const nomesUsados = new Set(usados.map(u=>u.nome));
  const mecanicos = RISCOS_MECANICOS_SUGERIDOS.filter(m=>!nomesUsados.has(m.nome));
  return [...usados, ...mecanicos].sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
}
function buscarDescricaoSugeridaRisco(nome){
  if(!nome) return null;
  const achado = sugestoesNomeRisco().find(s=>s.nome===nome);
  return achado ? achado.desc : null;
}
function listaSugestoesFiltrada(textoAtual){
  const q = (textoAtual||"").trim().toLowerCase();
  let lista = sugestoesNomeRisco();
  if(q) lista = lista.filter(s=>s.nome.toLowerCase().includes(q));
  return lista.slice(0,15);
}

/* =========================================================================
   ARMAZENAMENTO — IndexedDB com fallback automático para localStorage e,
   em último caso, memória.
   ========================================================================= */
const DB_NAME = "apr_campo_db", DB_STORE = "estado", DB_KEY = "principal";
const DB_STORE_HANDLES = "handles", DB_KEY_PASTA = "pastaBase";
const LS_KEY = "apr_campo_backup_v1";
let __db = null;
let __storageMode = "indexeddb";
let __memoryFallback = null;
function temIndexedDB(){ try{ return (typeof indexedDB !== "undefined") && indexedDB !== null; }catch(e){ return false; } }
function dbOpen(){
  return new Promise((resolve,reject)=>{
    if(__db) return resolve(__db);
    if(!temIndexedDB()) return reject(new Error("indexedDB indisponível neste navegador"));
    try{
      const req = indexedDB.open(DB_NAME,2);
      req.onupgradeneeded = function(){
        const db = req.result;
        if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
        if(!db.objectStoreNames.contains(DB_STORE_HANDLES)) db.createObjectStore(DB_STORE_HANDLES);
      };
      req.onsuccess = function(){ __db = req.result; resolve(__db); };
      req.onerror = function(){ reject(req.error); };
    }catch(e){ reject(e); }
  });
}
/* Guarda/recupera o "atalho" (FileSystemDirectoryHandle) da pasta-base escolhida pelo
   usuário. É um objeto especial do navegador (não é texto simples), por isso fica numa
   gaveta própria do IndexedDB, separada do restante dos dados do app. Se o navegador não
   suportar esse recurso (ex.: iPhone/iPad), as funções simplesmente não fazem nada. */
async function salvarHandlePastaBase(handle){
  if(!temIndexedDB()) return false;
  try{
    const db = await dbOpen();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE_HANDLES,"readwrite");
      tx.objectStore(DB_STORE_HANDLES).put(handle, DB_KEY_PASTA);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error);
    });
    return true;
  }catch(e){ return false; }
}
async function lerHandlePastaBase(){
  if(!temIndexedDB()) return null;
  try{
    const db = await dbOpen();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE_HANDLES,"readonly");
      const rq = tx.objectStore(DB_STORE_HANDLES).get(DB_KEY_PASTA);
      rq.onsuccess=()=>resolve(rq.result||null);
      rq.onerror=()=>reject(rq.error);
    });
  }catch(e){ return null; }
}
async function apagarHandlePastaBase(){
  if(!temIndexedDB()) return;
  try{
    const db = await dbOpen();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE_HANDLES,"readwrite");
      tx.objectStore(DB_STORE_HANDLES).delete(DB_KEY_PASTA);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error);
    });
  }catch(e){}
}
/* Modelo de laudo Word (.docx) enviado pelo próprio usuário, para substituir o modelo
   padrão da MecSete sem precisar mexer no código do app. Fica salvo como texto (base64)
   na mesma gaveta do IndexedDB usada para o restante dos dados, com localStorage como
   respaldo. Se não houver nenhum modelo enviado, o app usa o modelo padrão embutido. */
const DB_KEY_MODELO = "modeloWordCustomB64";
const LS_KEY_MODELO = "apr_campo_modelo_custom_v1";

        tx.oncomplete=()=>resolve(true);
        tx.onerror=()=>reject(tx.error);
      });
      return true;
    }catch(e){}

}
async function lerModeloWordCustom(){
  if(temIndexedDB()){
    try{
      const db = await dbOpen();
      const val = await new Promise((resolve,reject)=>{
        const tx = db.transaction(DB_STORE,"readonly");

        rq.onsuccess=()=>resolve(rq.result||null);
        rq.onerror=()=>reject(rq.error);
      });
      if(val) return val;
    }catch(e){}
  }
  try{ return localStorage.getItem(LS_KEY_MODELO) || null; }catch(e){ return null; }
}
async function apagarModeloWordCustom(){
  if(temIndexedDB()){
    try{
      const db = await dbOpen();

        const tx = db.transaction(DB_STORE,"readwrite");
        tx.objectStore(DB_STORE).delete(DB_KEY_MODELO);
        tx.oncomplete=()=>resolve(true);
        tx.onerror=()=>reject(tx.error);
      });
    }catch(e){}
  }
  try{ localStorage.removeItem(LS_KEY_MODELO); }catch(e){}
}
async function dbGet(){
  try{
    const db = await dbOpen();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE,"readonly");
      const rq = tx.objectStore(DB_STORE).get(DB_KEY);
      rq.onsuccess=function(){ resolve(rq.result||null); };
      rq.onerror=function(){ reject(rq.error); };
    });
  }catch(e){
    __storageMode = "localstorage";
    try{ const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e2){ __storageMode = "memoria"; return __memoryFallback; }
  }
}
async function dbSet(val){
  if(__storageMode==="indexeddb"){
    try{
      const db = await dbOpen();
      await new Promise((resolve,reject)=>{
        const tx = db.transaction(DB_STORE,"readwrite");
        tx.objectStore(DB_STORE).put(val, DB_KEY);
        tx.oncomplete=function(){ resolve(true); };
        tx.onerror=function(){ reject(tx.error); };
      });
      return true;
    }catch(e){ __storageMode = "localstorage"; }
  }
  if(__storageMode==="localstorage"){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(val)); return true; }
    catch(e){ __storageMode = "memoria"; }
  }
  __memoryFallback = val;
  return true;
}
async function carregarEstadoSalvo(){ return await dbGet(); }

/* =========================================================================
   PASTA LOCAL (Backup + Downloads) — usa o seletor de pastas do próprio
   sistema (Android/Windows/Mac). O usuário pode escolher, por exemplo, a
   pasta do app OneDrive instalado no aparelho: tudo que o app salvar ali
   sincroniza com a nuvem automaticamente, pelo próprio OneDrive — o app em
   si nunca acessa a internet ou faz login em nada.
   Suporte: Chrome/Edge (Android e desktop). Sem suporte: Safari/iPhone — o
   app cai automaticamente no botão de download tradicional.
   ========================================================================= */
const SUBPASTA_BACKUP = "Backup";
const SUBPASTA_DOWNLOADS = "Downloads das exportações";
function suportaPastaLocal(){ return typeof window.showDirectoryPicker === "function"; }
let __pastaBaseHandle = null; // cache em memória da sessão atual
let __syncStatusAtual = "verificando"; // 'verificando' | 'ok' | 'erro' | 'sem-pasta' | 'nao-suportado' — só em memória, recalculado a cada sessão

async function escolherPastaBase(){
  if(!suportaPastaLocal()){
    toast("Este navegador não permite escolher pasta — use o download normal", false);
    return;
  }
  try{
    const handle = await window.showDirectoryPicker({ mode: "readwrite" });
    // Garante (cria, se ainda não existir) as duas subpastas dentro da pasta escolhida.
    await handle.getDirectoryHandle(SUBPASTA_BACKUP, {create:true});
    await handle.getDirectoryHandle(SUBPASTA_DOWNLOADS, {create:true});
    __pastaBaseHandle = handle;
    await salvarHandlePastaBase(handle);
    STATE.pastaConfigNome = handle.name;
    persistir();
    __assinaturasSimples = { mapa:null }; __assinaturasCompleto = { mapa:null }; // força tratar todos os itens existentes como pendentes
    __avisouPermissaoExpirada = false;
    sincronizarIncrementalNaPasta();
    toast(`Pasta "${handle.name}" configurada`);
    render();
  }catch(e){
    if(e && e.name === "AbortError") return; // usuário cancelou o seletor — sem aviso de erro
    toast("Não foi possível usar essa pasta", false);
  }
}
async function removerPastaBase(){
  __pastaBaseHandle = null;
  await apagarHandlePastaBase();
  STATE.pastaConfigNome = null;
  persistir();
  toast("Pasta removida das configurações");
  render();
}
/* Confirma que ainda temos permissão de escrita (o navegador pode revogar
   silenciosamente após um tempo, por segurança) e, se preciso, pede de novo —
   sempre em resposta a um toque do usuário, nunca sozinho em segundo plano. */
async function obterPastaBaseComPermissao(){
  if(!suportaPastaLocal()) return null;
  if(!__pastaBaseHandle){
    __pastaBaseHandle = await lerHandlePastaBase();
  }
  if(!__pastaBaseHandle) return null;
  try{
    const perm = await __pastaBaseHandle.queryPermission({mode:"readwrite"});
    if(perm === "granted") return __pastaBaseHandle;
    const pedido = await __pastaBaseHandle.requestPermission({mode:"readwrite"});
    if(pedido === "granted") return __pastaBaseHandle;
    return null;
  }catch(e){ return null; }
}
/* Ação do chip "Pasta desconectada": pede a permissão de novo (só funciona em
   resposta a um toque, por isso fica fora do fluxo automático de sincronização)
   e, se conceder, já dispara uma sincronização completa na hora. */
async function reconectarPastaBase(){
  const base = await obterPastaBaseComPermissao();
  if(!base){
    toast("Não foi possível reconectar — escolha a pasta novamente em Backup", false);
    return;
  }
  toast("Pasta reconectada");
  await sincronizarIncrementalNaPasta();
}
/* Ação do chip "Backup automático não configurado": leva direto para a tela
   de Backup do módulo atual. */
function irParaConfigBackup(){
  if(STATE.modulo==="simplificado") go("simples-config-backup");
  else go("backup");
}
/* Salva um Blob direto numa das duas subpastas. Retorna true em caso de sucesso. */
async function salvarBlobNaPasta(subpasta, blob, filename){
  const base = await obterPastaBaseComPermissao();
  if(!base) return false;
  try{
    const dir = await base.getDirectoryHandle(subpasta, {create:true});
    // Evita deixar um arquivo de 0 KB visível caso a escrita falhe no meio do caminho
    // (ex.: permissão expirar durante o processo, pouca memória, etc.): grava primeiro
    // num nome temporário e só troca para o nome final depois que TODO o conteúdo foi
    // escrito e confirmado com sucesso. Se algo falhar antes disso, sobra (no máximo)
    // um arquivo temporário, nunca um arquivo final vazio no lugar do anterior.
    const nomeTemp = filename + ".tmp";
    const fileHandleTemp = await dir.getFileHandle(nomeTemp, {create:true});
    const writable = await fileHandleTemp.createWritable();
    await writable.write(blob);
    await writable.close();
    // Confirma que o arquivo temporário foi gravado com o tamanho esperado antes de
    // promovê-lo a definitivo — proteção extra contra escrita incompleta silenciosa.
    const arquivoGravado = await fileHandleTemp.getFile();
    if(arquivoGravado.size !== blob.size){
      try{ await dir.removeEntry(nomeTemp); }catch(e2){}
      return false;
    }
    // Promove o temporário para o nome final. move() é suportado nos mesmos
    // navegadores que suportam showDirectoryPicker; se não existir, recorre a
    // copiar o conteúdo já confirmado para o arquivo final e então apagar o temporário.
    if(typeof fileHandleTemp.move === "function"){
      await fileHandleTemp.move(filename);
    }else{
      const fileHandleFinal = await dir.getFileHandle(filename, {create:true});
      const writableFinal = await fileHandleFinal.createWritable();
      await writableFinal.write(arquivoGravado);
      await writableFinal.close();
      await dir.removeEntry(nomeTemp);
    }
    return true;
  }catch(e){ return false; }
}
/* Mesma ideia de obterPastaBaseComPermissao, mas para uso em segundo plano (sem
   toque do usuário): nunca chama requestPermission (o navegador recusaria mesmo,
   e poderia disparar um prompt indesejado). Só usa a permissão se ela já estiver
   concedida; caso contrário, sinaliza para o app avisar discretamente que é
   preciso reabrir a pasta uma vez. */
async function obterPastaBaseSemPedirPermissao(){
  if(!suportaPastaLocal()) return null;
  if(!__pastaBaseHandle){
    __pastaBaseHandle = await lerHandlePastaBase();
  }
  if(!__pastaBaseHandle) return null;
  try{
    const perm = await __pastaBaseHandle.queryPermission({mode:"readwrite"});
    return perm === "granted" ? __pastaBaseHandle : null;
  }catch(e){ return null; }
}
function nomeArquivoSeguro(s){
  return String(s||"sem-nome").trim().slice(0,80)
    .replace(/[\\/:*?"<>|]/g, "-")   // caracteres proibidos em nomes de pasta/arquivo
    .replace(/\s+/g, " ")
    .replace(/^\.+/, "") || "sem-nome";
}
/* Segmento de pasta = nome (legível, pra quem for olhar a pasta pelo gerenciador
   de arquivos) + um sufixo curto do id (só os últimos 6 caracteres, que já vêm
   de uid() e são praticamente únicos). Sem o sufixo, dois projetos/áreas/máquinas/
   tarefas DIFERENTES criados de forma independente com o MESMO nome — bem comum
   quando dois celulares estão no mesmo ambiente, cada um vendo um risco diferente
   — cairiam na mesma pasta e um arquivo sobrescreveria o outro no OneDrive. Com
   o sufixo, cada item sempre tem sua própria pasta, não importa o nome escolhido. */
function segmentoPastaComId(nome, id){
  const base = nomeArquivoSeguro(nome);
  const sufixo = String(id||"").slice(-6) || "000000";
  return `${base} (${sufixo})`;
}

/* =========================================================================
   SINCRONIZAÇÃO INCREMENTAL — grava na pasta configurada SOMENTE o que foi
   criado ou alterado desde a última vez, um arquivo por item (Área, Máquina,
   Tarefa ou Risco), espelhando a hierarquia em subpastas. Nunca reescreve nem
   apaga o backup inteiro — apenas complementa. Se um item for editado de novo,
   só o arquivo dele é atualizado (não os outros).
   Funciona só para o Módulo Simplificado.
   ========================================================================= */
let __ultimoSyncAssinaturas = null; // Map: id do item -> atualizadoEm já gravado na pasta
let __avisouPermissaoExpirada = false;

function pastaItem(...partes){
  // Cada parte é sanitizada INDIVIDUALMENTE antes de juntar — evita que um "/"
  // que já esteja dentro de um caminho montado anteriormente seja trocado por "-"
  // e quebre a estrutura de subpastas (bug corrigido).
  return partes.filter(Boolean).map(nomeArquivoSeguro);
}
/* Percorre toda a árvore do módulo simplificado e devolve uma lista plana de
   itens sincronizáveis, cada um já com o caminho de pastas (array de segmentos)
   e o nome de arquivo que deve ter dentro da pasta-base. */
function listarItensSincronizaveisSimples(){
  const itens = [];
  STATE.projetosSimples.forEach(proj=>{
    const segProj = segmentoPastaComId(proj.empresa || proj.nome || "Projeto", proj.id);
    proj.areas.forEach(area=>{
      const segArea = segmentoPastaComId(area.nome || "Área", area.id);
      const caminhoProj = [segProj];
      const caminhoArea = [segProj, segArea];
      // Salva só os campos próprios da área (sem "maquinas" embutido) — as máquinas já
      // são sincronizadas em seus próprios arquivos individuais abaixo. Embutir a lista
      // completa de máquinas aqui duplicava todo o conteúdo (e todas as fotos) dentro do
      // arquivo da área, fazendo-o crescer sem limite e ultrapassar o tamanho aceito pelo
      // OneSync para envio.
      const areaSemMaquinas = {};
      for(const chave in area){ if(chave !== "maquinas") areaSemMaquinas[chave] = area[chave]; }
      itens.push({ id:"area:"+area.id, tipo:"area", atualizadoEm:area.atualizadoEm||area.criadoEm||0,
        pasta:caminhoArea, arquivo:`_area.json`, dados:areaSemMaquinas });
      area.maquinas.forEach(maquina=>{
        const segMaquina = segmentoPastaComId(nomeMaquinaS(maquina) || "Máquina", maquina.id);
        const caminhoMaquina = [...caminhoArea, segMaquina];
        // Mesma lógica da área: o arquivo da máquina não embute "tarefas" (que por sua
        // vez embutiriam riscos e fotos) — essas já têm seus próprios arquivos abaixo.
        const maquinaSemTarefas = {};
        for(const chave in maquina){ if(chave !== "tarefas") maquinaSemTarefas[chave] = maquina[chave]; }
        itens.push({ id:"maquina:"+maquina.id, tipo:"maquina", atualizadoEm:maquina.atualizadoEm||maquina.criadoEm||0,
          pasta:caminhoMaquina, arquivo:`_maquina.json`, dados:maquinaSemTarefas });
        maquina.tarefas.forEach(tarefa=>{
          const tarefaTxt = tarefa.tarefa===OUTRO ? tarefa.tarefaOutro : tarefa.tarefa;
          const segTarefa = segmentoPastaComId(tarefaTxt || "Tarefa", tarefa.id);
          const caminhoTarefa = [...caminhoMaquina, segTarefa];
          // Mesma lógica: o arquivo da tarefa não embute "riscos" (que carregam as
          // fotos de cada risco) — eles já têm seus próprios arquivos abaixo.
          const tarefaSemRiscos = {};
          for(const chave in tarefa){ if(chave !== "riscos") tarefaSemRiscos[chave] = tarefa[chave]; }
          itens.push({ id:"tarefa:"+tarefa.id, tipo:"tarefa", atualizadoEm:tarefa.atualizadoEm||tarefa.criadoEm||0,
            pasta:caminhoTarefa, arquivo:`_tarefa.json`, dados:tarefaSemRiscos });
          tarefa.riscos.forEach(risco=>{
            itens.push({ id:"risco:"+risco.id, tipo:"risco", atualizadoEm:risco.atualizadoEm||risco.criadoEm||0,
              pasta:caminhoTarefa, arquivo:`risco_${risco.id}.json`, dados:risco });
          });
        });
      });
    });
  });
  return itens;
}
/* Equivalente à função acima, mas para o Módulo Completo (STATE.projetos). Só LEITURA
   dos dados que o Módulo Completo já mantém — nenhuma linha do Módulo Completo em si foi
   alterada para viabilizar isto. A hierarquia é a mesma (Projeto → Área → Máquina → Tarefa
   → Perigo), só com o último nível chamado "perigos" em vez de "riscos". Mesma lógica de
   nunca embutir o nível de baixo dentro do arquivo do nível de cima, para não duplicar fotos. */
function listarItensSincronizaveisCompleto(){
  const itens = [];
  (STATE.projetos||[]).forEach(proj=>{
    const segProj = segmentoPastaComId(proj.empresa || "Projeto", proj.id);
    proj.areas.forEach(area=>{
      const segArea = segmentoPastaComId(area.nome || "Área", area.id);
      const caminhoProj = [segProj];
      const caminhoArea = [segProj, segArea];
      const areaSemMaquinas = {};
      for(const chave in area){ if(chave !== "maquinas") areaSemMaquinas[chave] = area[chave]; }
      itens.push({ id:"c-area:"+area.id, tipo:"area", atualizadoEm:area.atualizadoEm||area.criadoEm||0,
        pasta:caminhoArea, arquivo:`_area.json`, dados:areaSemMaquinas });
      area.maquinas.forEach(maquina=>{
        const segMaquina = segmentoPastaComId(maquina.nome || maquina.tag || "Máquina", maquina.id);
        const caminhoMaquina = [...caminhoArea, segMaquina];
        const maquinaSemTarefas = {};
        for(const chave in maquina){ if(chave !== "tarefas") maquinaSemTarefas[chave] = maquina[chave]; }
        itens.push({ id:"c-maquina:"+maquina.id, tipo:"maquina", atualizadoEm:maquina.atualizadoEm||maquina.criadoEm||0,
          pasta:caminhoMaquina, arquivo:`_maquina.json`, dados:maquinaSemTarefas });
        maquina.tarefas.forEach(tarefa=>{
          const tarefaTxt = tarefa.tarefa===OUTRO ? tarefa.tarefaOutro : tarefa.tarefa;
          const segTarefa = segmentoPastaComId(tarefaTxt || "Tarefa", tarefa.id);
          const caminhoTarefa = [...caminhoMaquina, segTarefa];
          const tarefaSemPerigos = {};
          for(const chave in tarefa){ if(chave !== "perigos") tarefaSemPerigos[chave] = tarefa[chave]; }
          itens.push({ id:"c-tarefa:"+tarefa.id, tipo:"tarefa", atualizadoEm:tarefa.atualizadoEm||tarefa.criadoEm||0,
            pasta:caminhoTarefa, arquivo:`_tarefa.json`, dados:tarefaSemPerigos });
          (tarefa.perigos||[]).forEach(perigo=>{
            itens.push({ id:"c-perigo:"+perigo.id, tipo:"perigo", atualizadoEm:perigo.atualizadoEm||perigo.criadoEm||0,
              pasta:caminhoTarefa, arquivo:`perigo_${perigo.id}.json`, dados:perigo });
          });
        });
      });
    });
  });
  return itens;
}
/* Grava (ou atualiza) o arquivo de um único item dentro da subpasta Backup,
   na sub-hierarquia que espelha Projeto/Área/Máquina/Tarefa. Não toca em
   nenhum outro arquivo. */
async function gravarItemNaPasta(base, item){
  let dir = await base.getDirectoryHandle(SUBPASTA_BACKUP, {create:true});
  if(Array.isArray(item.pasta)){
    for(const parte of item.pasta){
      dir = await dir.getDirectoryHandle(parte, {create:true});
    }
  }
  // Mesma proteção usada em salvarBlobNaPasta: grava em nome temporário, confirma o
  // tamanho, e só então promove ao nome final — para nunca deixar o arquivo do item
  // (área/máquina/tarefa/risco) como 0 KB se a escrita falhar no meio do caminho.
  const conteudo = JSON.stringify(item.dados, null, 0);
  const nomeTemp = item.arquivo + ".tmp";
  const fileHandleTemp = await dir.getFileHandle(nomeTemp, {create:true});
  const writable = await fileHandleTemp.createWritable();
  await writable.write(conteudo);
  await writable.close();
  const arquivoGravado = await fileHandleTemp.getFile();
  if(arquivoGravado.size !== new Blob([conteudo]).size){
    try{ await dir.removeEntry(nomeTemp); }catch(e2){}
    throw new Error("Gravação incompleta — arquivo temporário descartado");
  }
  if(typeof fileHandleTemp.move === "function"){
    await fileHandleTemp.move(item.arquivo);
  }else{
    const fileHandleFinal = await dir.getFileHandle(item.arquivo, {create:true});
    const writableFinal = await fileHandleFinal.createWritable();
    await writableFinal.write(conteudo);
    await writableFinal.close();
    await dir.removeEntry(nomeTemp);
  }
}
/* Apaga o arquivo de um item específico dentro da subpasta Backup (usado quando
   o item foi excluído no app). Se a pasta ou o arquivo já não existirem, ignora
   silenciosamente — não é um erro, só significa que já não havia nada a apagar. */
async function apagarItemDaPasta(base, registro){
  try{
    let dir = await base.getDirectoryHandle(SUBPASTA_BACKUP, {create:false});
    for(const parte of registro.pasta){
      dir = await dir.getDirectoryHandle(parte, {create:false});
    }
    await dir.removeEntry(registro.arquivo);
  }catch(e){
    // NotFoundError (pasta/arquivo já não existe) ou outro problema pontual — sem efeito colateral.
  }
}
/* Ponto de entrada chamado a cada vez que algo é salvo (ver persistir()).
   Roda em segundo plano, sem travar a tela e sem pedir permissão sozinha.
   Sincroniza os DOIS módulos, cada um na sua própria subpasta-raiz dentro de
   "Backup" (Backup/Simplificado e Backup/Completo), para nunca misturar os dois
   conjuntos de dados. Cada módulo tem seu próprio controle independente de
   "o que já foi sincronizado" (__ultimoSyncAssinaturasSimples / __Completo),
   então uma falha ou pendência num módulo nunca afeta o outro.
   Compara a lista atual de itens com a última sincronizada: grava os itens
   novos/alterados E apaga, na pasta, os arquivos de itens que existiam antes
   e não existem mais (foram excluídos no app). */
async function sincronizarModuloNaPasta(base, raizModulo, listarItens, mapaAssinaturasRef){
  const itensAtuais = listarItens();
  if(!mapaAssinaturasRef.mapa) mapaAssinaturasRef.mapa = new Map();
  const assinaturas = mapaAssinaturasRef.mapa;
  const idsAtuais = new Set(itensAtuais.map(it=>it.id));

  const idsExcluidos = [];
  assinaturas.forEach((registro, id)=>{ if(!idsAtuais.has(id)) idsExcluidos.push(id); });
  for(const id of idsExcluidos){
    const registro = assinaturas.get(id);
    try{ await apagarItemDaPasta(base, {...registro, pasta:[raizModulo, ...registro.pasta]}); }catch(e){}
    assinaturas.delete(id);
  }

  const pendentes = itensAtuais.filter(it => {
    const registro = assinaturas.get(it.id);
    return !registro || registro.atualizadoEm !== it.atualizadoEm;
  });
  for(const item of pendentes){
    try{
      await gravarItemNaPasta(base, {...item, pasta:[raizModulo, ...item.pasta]});
      assinaturas.set(item.id, {atualizadoEm:item.atualizadoEm, pasta:item.pasta, arquivo:item.arquivo});
    }catch(e){
      // Falha pontual num item não interrompe os demais; tenta de novo na próxima alteração.
    }
  }
  return { gravados: pendentes.length, excluidos: idsExcluidos.length };
}
let __assinaturasSimples = { mapa:null };
let __assinaturasCompleto = { mapa:null };
async function sincronizarIncrementalNaPasta(){
  if(!suportaPastaLocal()){
    __syncStatusAtual = "nao-suportado";
    atualizarChipSync();
    return;
  }
  if(!STATE.pastaConfigNome){
    __syncStatusAtual = "sem-pasta";
    atualizarChipSync();
    return;
  }
  try{
    const base = await obterPastaBaseSemPedirPermissao();
    if(!base){
      // Pasta configurada mas sem permissão de escrita no momento (comum após
      // reabrir o app — o navegador revoga o acesso). Avisa discretamente uma
      // única vez por sessão, além de deixar o selo visível permanentemente.
      __syncStatusAtual = "erro";
      atualizarChipSync();
      if(!__avisouPermissaoExpirada){
        __avisouPermissaoExpirada = true;
        toast("Reabra a pasta configurada (Backup) para retomar a sincronização automática", false);
      }
      return;
    }
    // Toque real no disco: além de confirmar a permissão, garante que a pasta
    // ainda existe de fato. Sem isso, se o usuário apagar a pasta no aparelho
    // e não houver nenhum item novo para gravar, nada tocaria o disco e a
    // exclusão nunca seria percebida — o selo ficaria "ok" indefinidamente.
    await base.getDirectoryHandle(SUBPASTA_BACKUP, {create:false});
    const resultadoSimples = await sincronizarModuloNaPasta(base, "Simplificado", listarItensSincronizaveisSimples, __assinaturasSimples);
    const resultadoCompleto = await sincronizarModuloNaPasta(base, "Completo", listarItensSincronizaveisCompleto, __assinaturasCompleto);
    __syncStatusAtual = "ok";
    __avisouPermissaoExpirada = false;
    // Guarda o horário só em memória; ele é persistido "de carona" na próxima
    // gravação normal do STATE (evita um dbSet() extra a cada sincronização).
    STATE.ultimaSincronizacaoEm = Date.now();
    atualizarChipSync();
    return {
      gravados: resultadoSimples.gravados + resultadoCompleto.gravados,
      excluidos: resultadoSimples.excluidos + resultadoCompleto.excluidos,
    };
  }catch(e){
    // Qualquer falha inesperada aqui (ex.: permissão revogada no meio do processo)
    // nunca pode deixar o selo "travado" mostrando um status desatualizado —
    // sempre cai para "erro" e atualiza a tela.
    __syncStatusAtual = "erro";
    atualizarChipSync();
  }
}

function comprimirImagem(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ()=>{
      img.onload = ()=>{
        let {width,height} = img;
        if(width>height && width>maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height>maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg", quality||0.7));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
/* Salva a foto automaticamente, sem nenhum botão/toque adicional do usuário.
   No Android isso costuma aparecer na Galeria (via Downloads). No iPhone, o
   próprio Safari não permite que uma página grave direto no álbum de Fotos
   sem o usuário confirmar — é uma restrição da Apple, não algo que dependa
   deste app; ainda assim a foto fica salva nos "Arquivos" do aparelho. */
function salvarFotoNaGaleria(dataUrl, nomeBase){
  try{
    const bytes = dataUrlToBytes(dataUrl);
    const isPng = dataUrl.startsWith("data:image/png");
    const ts = new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
    downloadBlob(bytes, `${nomeBase||"foto"}_${ts}.${isPng?'png':'jpg'}`, isPng?"image/png":"image/jpeg");
  }catch(e){ console.warn("Não foi possível salvar a foto automaticamente", e); }
}

function todosRiscosDe(escopo){
  // escopo: {} | {projeto} | {projeto,area} | {projeto,area,maquina} | {projeto,area,maquina,tarefa}
  const out = [];
  const projetosFonte = escopo.projeto ? [escopo.projeto] : STATE.projetosSimples;
  projetosFonte.forEach(proj=>{
    const areasFonte = escopo.area ? [escopo.area] : proj.areas;
    areasFonte.forEach(area=>{
      const maquinasFonte = escopo.maquina ? [escopo.maquina] : area.maquinas;
      maquinasFonte.forEach(maquina=>{
        const tarefasFonte = escopo.tarefa ? [escopo.tarefa] : maquina.tarefas;
        tarefasFonte.forEach(tarefa=>{
          tarefa.riscos.forEach(risco=> out.push({proj,area,maquina,tarefa,risco}) );
        });
      });
    });
  });
  return out;
}

let __saveTimer = null;
function marcarAlterado(){
  clearTimeout(__saveTimer);
  setSaveChip(true);
  // Feedback imediato: assim que algo é editado, o selo já avisa "sincronizando…"
  // em vez de ficar mudo até o processo terminar (o que deixava a impressão de
  // que nada tinha acontecido). Não mexe em "sem-pasta"/"não suportado", que são
  // estados estruturais (não é o caso de "está processando", é "não tem o quê").
  if(__syncStatusAtual!=="sem-pasta" && __syncStatusAtual!=="nao-suportado"){
    __syncStatusAtual = "sincronizando";
    atualizarChipSync();
  }
  __saveTimer = setTimeout(persistir, 450);
}

  try{ await dbSet(STATE); setSaveChip(false); }
  catch(e){ console.error("Falha ao salvar localmente", e); }

function setSaveChip(saving){
  const el = document.getElementById("saveChip");
  if(!el) return;
  el.classList.toggle("saving", saving);

/* Texto relativo BEM curto (sem "há"), para caber ao lado do ícone no cabeçalho. */
function tempoRelativoCurto(ts){
  if(!ts) return null;
  const diffMs = Date.now() - ts;
  if(diffMs < 60000) return "agora";
  const min = Math.floor(diffMs/60000);
  if(min < 60) return min+"min";
  const h = Math.floor(min/60);
  if(h < 24) return h+"h";
  const d = Math.floor(h/24);
  return d+"d";
}
/* Monta o HTML do selo compacto de sincronização, para o canto direito do
   cabeçalho (chamado tanto no primeiro render quanto nas atualizações
   direcionadas via atualizarChipSync()). Fica curto de propósito: ícone + tempo
   quando está tudo certo; ícone de alerta + frase curta quando precisa de ação. */
function chipSyncHtml(){
  if(__syncStatusAtual==="nao-suportado") return "";
  if(__syncStatusAtual==="sem-pasta"){
    return `<button class="syncbadge alerta" id="syncChip" onclick="App.irParaConfigBackup()" title="Backup automático não configurado">${ic('warn')}<span>Configurar backup</span></button>`;
  }
  if(__syncStatusAtual==="erro"){
    return `<button class="syncbadge alerta" id="syncChip" onclick="App.reconectarPastaBase()" title="Pasta desconectada — toque para reconectar">${ic('warn')}<span>Reconectar backup</span></button>`;
  }
  if(__syncStatusAtual==="sincronizando"){
    return `<span class="syncbadge sincronizando" id="syncChip" title="Salvando a alteração na pasta configurada">${ic('folder')}<span>sincronizando…</span></span>`;
  }
  // "verificando" (checagem inicial da sessão ainda em andamento) e "ok" usam o
  // mesmo visual neutro: ícone + último horário conhecido (se já existir um).
  const rel = tempoRelativoCurto(STATE.ultimaSincronizacaoEm);
  return `<button class="syncbadge" id="syncChip" onclick="App.irParaConfigBackup()" title="Backup sincronizado com a pasta configurada">${ic('folder')}${rel? `<span>${rel}</span>`:''}</button>`;
}
/* Atualiza só o selo de sync no DOM (se estiver na tela atual), sem tocar no
   resto da página — mesma lógica do setSaveChip(), para nunca interromper o
   usuário no meio de uma edição (nada de innerHTML da tela inteira aqui). */
function atualizarChipSync(){
  const el = document.getElementById("syncChip");
  if(!el) return; // chip não está na tela atual — vai refletir o status certo na próxima vez que aparecer
  el.outerHTML = chipSyncHtml() || `<span id="syncChip" style="display:none"></span>`;
}
function toast(msg, ok){
  const el = document.getElementById("toast");
  if(!el) return;
  el.innerHTML = (ok!==false? ic("check"):ic("info")) + "<span>"+escapeHtml(msg)+"</span>";
  el.classList.add("show");
  clearTimeout(el.__t);
  el.__t = setTimeout(()=>el.classList.remove("show"), 2200);

let __dragState = null; // { tipo, arr, id, startY, cardEl, rects }
function moverDragGenerico(e){
  if(!__dragState) return;
  const dy = e.clientY - __dragState.startY;
  __dragState.cardEl.style.transform = `translateY(${dy}px)`;
}
function finalizarDragGenerico(e){
  if(!__dragState) return;
  const ds = __dragState;
  ds.cardEl.style.transform = "";
  ds.cardEl.classList.remove("dragging");
  const finalY = e.clientY;
  let novoIndex = ds.rects.length - 1;
  for(let i=0;i<ds.rects.length;i++){
    const meio = ds.rects[i].rect.top + ds.rects[i].rect.height/2;
    if(finalY < meio){ novoIndex = i; break; }
  }
  __dragState = null;
  const idxAtual = ds.arr.findIndex(x=>x.id===ds.id);
  if(idxAtual>=0){
    const [item] = ds.arr.splice(idxAtual,1);
    let destino = novoIndex;
    if(destino > idxAtual) destino--;
    ds.arr.splice(destino,0,item);
    marcarAlterado();
  }
  render();
}
/* Padrão único de clique nos cards de Máquina/Tarefa/Risco:
   - Clicar na foto -> abre a foto (se houver)
   - Clicar no nome -> edita o card
   - Clicar nos 3 pontos -> menu de opções (tratado pelo próprio botão, não passa por aqui)
   - Clicar em qualquer outra área do card -> avança para o próximo nível da hierarquia */
function cardClickGenerico(ev, cardEl){
  if(ev.target.closest(".sel-check") || ev.target.closest(".drag-handle")) return;
  const alvoMenu = ev.target.closest(".card-menu-btn");
  if(alvoMenu){
    const acaoMenu = cardEl.getAttribute("data-card-menu");
    if(acaoMenu){ new Function("event", acaoMenu)(ev); }
    return;
  }
  if(__selMode){
    const tipo = cardEl.getAttribute("data-sel-tipo");
    const id = cardEl.getAttribute("data-sel-id");
    if(__selMode.tipo===tipo){ App.toggleSelecao(id); }
    return;
  }
  const alvoFoto = ev.target.closest('[data-card-role="photo"]');
  if(alvoFoto){
    const acaoFoto = cardEl.getAttribute("data-card-photo");
    if(acaoFoto) new Function(acaoFoto)();
    return;
  }
  const alvoNome = ev.target.closest('[data-card-role="name"]');
  if(alvoNome){
    const acaoEdit = cardEl.getAttribute("data-card-edit");
    if(acaoEdit){ new Function(acaoEdit)(); return; }
  }
  const acaoOpen = cardEl.getAttribute("data-card-open");
  if(acaoOpen) new Function(acaoOpen)();
}
let __longPressTimer = null;
let __longPressActive = false;
function cancelarLongPressPendente(){
  clearTimeout(__longPressTimer);
  __longPressTimer = null;
  __longPressActive = false;
}
function attachLongPressHandlers(){
  let startX=0, startY=0;
  document.addEventListener("pointerdown", (e)=>{
    cancelarLongPressPendente();
    const card = e.target.closest(".list-card[data-sel-tipo]");
    if(!card || e.target.closest(".card-menu-btn") || e.target.closest(".drag-handle")) return;
    startX=e.clientX; startY=e.clientY; __longPressActive = true;
    const idAlvo = card.getAttribute("data-sel-id");
    const tipoAlvo = card.getAttribute("data-sel-tipo");
    __longPressTimer = setTimeout(()=>{
      if(!__longPressActive) return;
      // Confere se a tela ainda corresponde ao mesmo tipo e se o card ainda existe no DOM atual
      // (evita ativar seleção sobre um item que já não está mais nesta tela, ex.: após mover/navegar).
      if(SCREEN_SEL_TIPO[STATE.ui.screen]!==tipoAlvo){ cancelarLongPressPendente(); return; }
      const cardAtual = document.querySelector(`.list-card[data-sel-tipo="${tipoAlvo}"][data-sel-id="${idAlvo}"]`);
      if(!cardAtual){ cancelarLongPressPendente(); return; }
      let ctx = {};
      try{ ctx = JSON.parse(cardAtual.getAttribute("data-sel-ctx")||"{}"); }catch(e){}
      App.iniciarSelecaoMultipla(tipoAlvo, idAlvo, ctx);
      cancelarLongPressPendente();
    }, 480);
  });
  document.addEventListener("pointermove", (e)=>{
    if(__dragState){ moverDragGenerico(e); return; }
    if(!__longPressTimer) return;
    if(Math.abs(e.clientX-startX)>10 || Math.abs(e.clientY-startY)>10) cancelarLongPressPendente();
  });
  document.addEventListener("pointerup", (e)=>{
    if(__dragState){ finalizarDragGenerico(e); return; }
    cancelarLongPressPendente();
  });
  document.addEventListener("pointercancel", (e)=>{
    if(__dragState){ finalizarDragGenerico(e); return; }
    cancelarLongPressPendente();
  });
}

function crumbBarS(){
  const s = STATE.ui.screen;
  if(s==="simples-projetos" || s==="simples-backup" || s==="simples-config" || s==="simples-config-backup" || s==="simples-config-ia" || s==="simples-config-empresa" || s==="simples-tabela") return "";
  const p = getCurrentProjetoSimples(); if(!p) return "";
  const a = getCurrentAreaSimples(), m = getCurrentMaquinaSimples(), t = getCurrentTarefaSimples();
  const parts=[{label:"Projetos", icon:"home", go:["simples-projetos",{}]}];
  parts.push({label:p.empresa||"Projeto", go:["simples-areas",{projetoSId:p.id, areaSId:null, maquinaSId:null, tarefaSId:null}]});
  if(a) parts.push({label:a.nome||"Área", go:["simples-maquinas",{areaSId:a.id, maquinaSId:null, tarefaSId:null}]});
  if(m) parts.push({label:(nomeMaquinaS(m)||"Máquina").slice(0,16), go:["simples-tarefas",{maquinaSId:m.id, tarefaSId:null}]});
  if(t) parts.push({label:(t.tarefa===OUTRO?t.tarefaOutro:t.tarefa)||"Tarefa", go:["simples-riscos",{tarefaSId:t.id}]});
  if(parts.length<2) return "";
  // Mostra a trilha completa; a única garantia é nunca exibir menos de 2 níveis
  // (já assegurado pelo corte acima — a trilha sempre tem 2+ itens quando aparece).
  const lastIdx=parts.length-1;
  const html = parts.map((seg,i)=>{
    const cur=i===lastIdx;
    const goArgs = JSON.stringify(seg.go[1]).replace(/'/g,"&#39;");
    const inner=(seg.icon?ic(seg.icon):"")+escapeHtml(seg.label.length>16?seg.label.slice(0,15)+"…":seg.label);
    return `<button class="crumb ${cur?'current':''}" onclick='App.go("${seg.go[0]}", ${goArgs})'>${inner}</button>`;
  }).join(`<span class="crumb-sep">${ic('chevR')}</span>`);
  return `<div class="crumbbar">${html}</div>`;
}

  const m = getCurrentMaquina();

  parts.push({label:(p.empresa||"Projeto"), go:["areas",{projetoId:p.id, areaId:null, maquinaId:null, tarefaId:null, perigoId:null}]});
  if(a) parts.push({label:a.nome||"Área", go:["maquinas",{areaId:a.id, maquinaId:null, tarefaId:null, perigoId:null}]});
  if(m) parts.push({label:m.nome||"Máquina", go:["tarefas",{maquinaId:m.id, tarefaId:null, perigoId:null}]});

  const lastIdx = parts.length-1;

/* =========================================================================
   AGREGAÇÕES (para dashboards e "ver todos os perigos")
   ========================================================================= */
function todosPerigosDe(escopo){
  // escopo: {projeto} | {projeto,area} | {projeto,area,maquina} | {projeto,area,maquina,tarefa}
  const out = [];
  const projetosFonte = escopo.projeto ? [escopo.projeto] : STATE.projetos;
  projetosFonte.forEach(proj=>{
    const areasFonte = escopo.area ? [escopo.area] : proj.areas;
    areasFonte.forEach(area=>{
      const maquinasFonte = escopo.maquina ? [escopo.maquina] : area.maquinas;
      maquinasFonte.forEach(maquina=>{
        const tarefasFonte = escopo.tarefa ? [escopo.tarefa] : maquina.tarefas;
        tarefasFonte.forEach(tarefa=>{
          tarefa.perigos.forEach(perigo=> out.push({proj,area,maquina,tarefa,perigo}) );
        });
      });
    });
  });
  return out;
}
function contarPerigosPendentes(lista){ return lista.filter(x=>necessitaMitigacao(x.perigo)).length; }
function piorRiscoDe(lista){
  const ordem = ["NEGLIGÍVEL","BAIXO","MÉDIO","ALTO","MUITO ALTO"];
  let pior = null;
  lista.forEach(x=>{
    const r = calcRisco(x.perigo.severidade,x.perigo.exposicao,x.perigo.evitabilidade);
    if(r && (!pior || ordem.indexOf(r) > ordem.indexOf(pior))) pior = r;
  });
  return pior;
}

/* =========================================================================
   EXPORTAÇÕES
   ========================================================================= */
function csvEscape(v){
  v = String(v==null?"":v).replace(/"/g,'""');
  return /[",\n;]/.test(v) ? `"${v}"` : v;
}
function downloadBlob(content, filename, mime){
  downloadBlobDireto(new Blob([content], {type:mime}), filename);
}
function downloadBlobDireto(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 400);
}
/* Compartilha um arquivo já gerado (Excel, Word, etc.) usando o menu nativo do
   celular ("Compartilhar com..."), permitindo enviar direto por WhatsApp, e-mail,
   Drive, etc. Se o navegador/dispositivo não suportar compartilhar arquivos
   (comum em desktop), cai automaticamente no download tradicional, sem travar o fluxo. */
const LIMITE_COMPARTILHAMENTO_BYTES = 25 * 1024 * 1024; // 25MB — limite prático seguro; arquivos maiores costumam
                                                          // ser recusados pelo sistema com "Permission denied", sem aviso claro.
async function compartilharOuBaixarBlob(blob, filename, mime, mensagemSucesso){
  salvarBlobNaPasta(SUBPASTA_DOWNLOADS, blob, filename); // silencioso e em paralelo — não atrasa nem trava o fluxo abaixo
  const podeCompartilharArquivo = !!(navigator.canShare && navigator.canShare({files:[new File([blob], filename, {type:mime})]}));
  if(!podeCompartilharArquivo){
    // Navegador/dispositivo sem suporte a compartilhar arquivos (ex.: a maioria dos desktops) — baixa direto.
    downloadBlobDireto(blob, filename);
    if(mensagemSucesso) toast(mensagemSucesso);
    return;
  }
  if(blob.size > LIMITE_COMPARTILHAMENTO_BYTES){
    // Arquivos grandes (muitas fotos) costumam ser recusados pelo sistema ao tentar compartilhar,
    // mesmo quando canShare() não sinaliza esse problema de antemão. Para não fazer o usuário
    // esperar por uma falha silenciosa, avisamos e já baixamos direto.
    const mb = (blob.size/1024/1024).toFixed(1);
    toast(`Arquivo de ${mb}MB é grande para compartilhar direto — baixando no aparelho`, false);
    downloadBlobDireto(blob, filename);
    return;
  }
  // O processamento das fotos (assíncrono) já consumiu o "toque" original do usuário,
  // e o menu nativo de compartilhar só abre em resposta a um toque direto e recente.
  // Por isso mostramos este modal: o clique em "Compartilhar" dentro dele é o toque
  // fresco que efetivamente abre o menu nativo do celular.
  mostrarArquivoProntoParaCompartilhar(blob, filename, mensagemSucesso);
}

/* ---------- Tabela Objetiva ---------- */
const GRUPOS_OBJETIVA = [
  { nome:"Identificação de Perigos", colunas:["Empresa","Área","Máquina/Ativo","Tarefa","Parte do Ativo","Perigo","Consequências Potenciais","Procedimento associado à tarefa","Medidas de mitigação existentes / sugeridas","Avaliação de Risco (ISO 14121 / NR-12)","PLr"] },
];
function linhaObjetiva({proj,area,maquina,tarefa,perigo:c}){
  const r = calcRisco(c.severidade,c.exposicao,c.evitabilidade);
  const mitig = necessitaMitigacao(c) ? c.descMedidaSugerida : c.descMedida;
  const tarefaTxt = tarefa.tarefa===OUTRO? tarefa.tarefaOutro : tarefa.tarefa;
  return [
    proj.empresa, area.nome, maquina.nome, tarefaTxt, c.parte,
    c.descPerigo===OUTRO?c.descPerigoOutro:c.descPerigo, c.consequencia===OUTRO?c.consequenciaOutro:c.consequencia,
    c.procedimentoAssociado, mitig, r||"Não avaliado", r? NIVEL_META[r].plr:"",
  ];
}
function exportarObjetivaCSV(){
  const linhas = linhasEscopo(STATE.ui.tabelaScope);
  const head = GRUPOS_OBJETIVA[0].colunas;

/* ---------- Gerador de Excel nativo (SpreadsheetML / "Excel 2003 XML") — sem imagens ---------- */
function escapeXml(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&apos;")
    .replace(/\r\n/g,"&#10;").replace(/\n/g,"&#10;").replace(/\r/g,"&#10;");
}
function xlsCellLegacy(value, styleId){
  const v = escapeXml(value);
  return styleId
    ? `<Cell ss:StyleID="${styleId}"><Data ss:Type="String">${v}</Data></Cell>`
    : `<Cell><Data ss:Type="String">${v}</Data></Cell>`;
}
function buildXlsDoc(sheetName, grupos, linhasDados){
  const groupCells = grupos.map(g=>{
    const span = g.colunas.length;
    const mergeAttr = span>1 ? ` ss:MergeAcross="${span-1}"` : "";
    return `<Cell ss:StyleID="sGrupo"${mergeAttr}><Data ss:Type="String">${escapeXml(g.nome)}</Data></Cell>`;
  }).join("");
  const headerCells = grupos.flatMap(g=>g.colunas).map(c=>xlsCellLegacy(c,"sHeader")).join("");
  const dataRows = linhasDados.map(row=> "<Row>"+row.map(v=>xlsCellLegacy(v)).join("")+"</Row>" ).join("");
  return `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 <Styles>
  <Style ss:ID="sGrupo"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#2A2E66" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>
  <Style ss:ID="sHeader"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#E94E1B" ss:Pattern="Solid"/></Style>
 </Styles>
 <Worksheet ss:Name="${escapeXml(sheetName.slice(0,31))}">
  <Table>
   <Row>${groupCells}</Row>
   <Row>${headerCells}</Row>
   ${dataRows}
  </Table>
 </Worksheet>
</Workbook>`;
}
function downloadXls(sheetName, grupos, linhasDados, filename){
  downloadBlob(buildXlsDoc(sheetName, grupos, linhasDados), filename, "application/vnd.ms-excel;charset=utf-8");
}

function esperar(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function chamarIA(tipo, textoUsuario){
  const apiKey = getIAApiKey();
  if(!apiKey) return null;
  const cfg = getIAConfig();
  const prompt = (cfg.prompts && cfg.prompts[tipo]) || IA_PROMPTS_PADRAO[tipo];
  const endpoint = (cfg.endpoint || IA_ENDPOINT_PADRAO).replace(/\/+$/,"");
  const modelo = cfg.modelo || IA_MODELO_PADRAO;
  try{
    const resp = await fetch(`${endpoint}/chat/completions`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${apiKey}` },
      body: JSON.stringify({ model: modelo, temperature: 0.3,
        messages:[ { role:"system", content: prompt }, { role:"user", content: textoUsuario || "" } ] })
    });
    if(!resp.ok) return null;
    const data = await resp.json();
    const texto = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    return texto ? String(texto).trim() : null;
  }catch(e){ console.error("Erro ao chamar IA:", e); return null; }
}

/* Gera uma cópia enriquecida das linhas de exportação (não mexe em STATE —
   a IA só afeta o arquivo exportado, os dados originais do app continuam
   intocados). Sem chave configurada, devolve os dados originais sem nenhuma
   chamada — a exportação continua 100% offline como sempre. */
async function enriquecerLinhasComIA(linhasRaw, onProgress){
  if(!getIAApiKey()) return linhasRaw;
  const cacheMaquina = new Map();
  const resultado = [];
  for(let i=0;i<linhasRaw.length;i++){
    const item = linhasRaw[i];
    if(onProgress) onProgress(i+1, linhasRaw.length);
    if(!cacheMaquina.has(item.maquina.id)){
      const [descEquip, escopo] = await Promise.all([
        chamarIA("equipamento", item.maquina.descricao || nomeMaquinaS(item.maquina)),
        chamarIA("escopo", `Nome: ${nomeMaquinaS(item.maquina)}\nDescrição: ${item.maquina.descricao||"(não informada)"}`),
      ]);
      cacheMaquina.set(item.maquina.id, { descricao: descEquip || item.maquina.descricao, escopo: escopo || item.maquina.escopo || "" });
      await esperar(200);
    }
    const cacheM = cacheMaquina.get(item.maquina.id);
    const medidaExistente = item.risco.medidaImplementada === "Sim";
    const [descRisco, mitig] = await Promise.all([
      chamarIA("risco", item.risco.descricao),
      chamarIA("mitigacao", medidaExistente ? item.risco.descMedida : item.risco.sugestaoMitigacao),
    ]);
    const riscoEnriquecido = { ...item.risco, descricao: descRisco || item.risco.descricao };
    if(medidaExistente) riscoEnriquecido.descMedida = mitig || item.risco.descMedida;
    else riscoEnriquecido.sugestaoMitigacao = mitig || item.risco.sugestaoMitigacao;
    resultado.push({ ...item, maquina:{...item.maquina, descricao:cacheM.descricao, escopo:cacheM.escopo}, risco:riscoEnriquecido });
    await esperar(200);
  }
  return resultado;
}

function buildGruposSimplesFotos(maxExtrasMaquina, maxExtrasRisco){
